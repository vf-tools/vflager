<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><meta name="robots" content="noindex"/><title>Vanfabrik · Lagerverwaltung</title><style>@import url('https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --pine:#14301b;
  --pine-mid:#1a4a2e;
  --sage:#8a9e80;
  --sage-light:#c8d4c0;
  --cream:#f5f2e8;
  --cream-light:#faf8f2;
  --burgundy:#8b1a0e;
  --gold:#f5c040;

  --bg:var(--cream);
  --surface:var(--cream-light);
  --surface2:#f0ede0;
  --surface3:#e8e4d4;
  --surface4:#dddac8;
  --border:#d8d4c4;
  --border2:#c4c0ae;

  --ink:var(--pine);
  --ink2:#2a4a34;
  --ink3:#6a8070;
  --ink4:#9aaa96;

  --c-text:var(--pine);
  --c-muted:#6a8070;
  --c-bg:var(--cream);
  --c-surface:var(--cream-light);
  --c-surface2:#f0ede0;
  --c-border:#d8d4c4;
  --c-accent:var(--pine);
  --c-accent2:var(--pine-mid);
  --c-green:var(--pine);
  --c-yellow:#8a6800;
  --c-blue:#1a3d7c;
  --c-purple:#4a2070;
  --c-red:var(--burgundy);
  --c-white:#ffffff;

  --r-sm:6px;
  --r-md:10px;
  --r-lg:14px;
  --r-xl:20px;
  --font:'Host Grotesk',system-ui,sans-serif;
  --sidebar-w:220px;
  --shadow-sm:0 1px 4px rgba(20,48,27,.08);
  --shadow-md:0 4px 16px rgba(20,48,27,.1);
}

html,body{
  height:100%;
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  font-size:14px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--font);font-size:14px;border:none;background:none}
input,select,textarea{font-family:var(--font);font-size:14px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Screens ── */
.screen{display:none}
.screen.active{display:flex}
#screen-app{height:100vh;overflow:hidden}

/* ── Role Selection ── */
#screen-role{
  min-height:100vh;
  align-items:center;justify-content:center;
  background:var(--cream);
}
.role-hero{text-align:center;padding:2rem}
.logo-hero{
  display:inline-flex;align-items:center;gap:12px;
  margin-bottom:2.5rem;
}
.logo-hero img{height:42px;width:42px;object-fit:contain}
.logo-hero-text{text-align:left}
.logo-hero-title{
  font-size:20px;font-weight:700;letter-spacing:-.04em;color:var(--pine);
}
.logo-hero-title span{font-weight:300;opacity:.5}
.logo-hero-sub{font-size:12px;color:var(--ink3);letter-spacing:.02em;text-transform:uppercase}
.role-prompt{font-size:.9rem;color:var(--ink3);margin-bottom:1.8rem}
.role-cards{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.role-card{
  width:180px;padding:1.8rem 1rem 1.4rem;
  background:var(--surface);
  border:1px solid var(--border);
  border-top:3px solid var(--pine);
  border-radius:var(--r-xl);
  display:flex;flex-direction:column;align-items:center;gap:.6rem;
  cursor:pointer;transition:all .2s;
  box-shadow:var(--shadow-sm);
}
.role-card:hover{
  border-color:var(--pine);
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(20,48,27,.12);
}
.role-icon{font-size:2rem}
.role-name{font-weight:700;font-size:.9rem;color:var(--pine);letter-spacing:-.01em}
.role-desc{font-size:.72rem;color:var(--ink3);text-align:center;line-height:1.4}

/* ── Sidebar ── */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  height:100vh;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:.8rem .6rem;
  overflow-y:auto;
}
.sidebar-logo{
  display:flex;align-items:center;gap:9px;
  padding:.4rem .5rem .9rem;
  border-bottom:1px solid var(--border);
  margin-bottom:.8rem;
  cursor:default;
}
.sidebar-logo img{height:28px;width:28px;object-fit:contain;flex-shrink:0}
.sl-title{font-size:.88rem;font-weight:700;letter-spacing:-.03em;color:var(--pine)}
.sl-title span{font-weight:300;opacity:.5}
.sl-sub{font-size:.65rem;color:var(--ink4);text-transform:uppercase;letter-spacing:.05em}

#role-badge{
  font-size:.68rem;font-weight:600;
  padding:.25rem .7rem;border-radius:var(--r-sm);
  margin-bottom:.8rem;text-align:center;
  background:#e8f0e8;color:var(--pine);
  border:1px solid var(--sage-light);
  letter-spacing:.01em;
}

nav{flex:1;display:flex;flex-direction:column;gap:1px}
.nav-item{
  display:flex;align-items:center;gap:6px;
  padding:.45rem .7rem;border-radius:var(--r-md);
  color:var(--ink3);font-size:.84rem;font-weight:500;
  cursor:pointer;transition:all .12s;letter-spacing:-.01em;
}
.nav-item:hover{background:var(--surface3);color:var(--ink)}
.nav-item.active{background:#e8f0e8;color:var(--pine);font-weight:600}
.nav-item .badge{
  margin-left:auto;
  background:var(--burgundy);color:#fff;
  font-size:.62rem;font-weight:700;
  padding:1px 6px;border-radius:10px;
}

.sidebar-footer{
  padding-top:.8rem;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px;
}
.btn-ghost{
  padding:.45rem .7rem;border-radius:var(--r-md);
  color:var(--ink3);font-size:.76rem;font-weight:500;
  transition:all .12s;text-align:left;
}
.btn-ghost:hover{background:var(--surface3);color:var(--ink)}

/* ── Main Content ── */
#main-content{flex:1;overflow-y:auto;background:var(--bg)}
.view{display:none;padding:28px 32px;min-height:100%}
.view.active{display:block}

/* ── Page Header ── */
.page-header{
  display:flex;align-items:center;gap:1rem;
  margin-bottom:1.6rem;flex-wrap:wrap;
  padding-bottom:1.2rem;border-bottom:1px solid var(--border);
}
.page-title{font-size:1.1rem;font-weight:700;letter-spacing:-.03em;color:var(--ink)}
.page-title span{color:var(--ink3);font-weight:400;font-size:.88rem;margin-left:6px;letter-spacing:0}
.page-actions{margin-left:auto;display:flex;gap:.5rem;flex-wrap:wrap}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:.35rem;
  padding:.45rem 1rem;border-radius:var(--r-md);
  font-weight:600;font-size:.84rem;
  cursor:pointer;transition:all .14s;
  letter-spacing:-.01em;
}
.btn-primary{
  background:var(--pine);color:#fff;
  border:1px solid var(--pine);
}
.btn-primary:hover{background:var(--pine-mid);border-color:var(--pine-mid)}
.btn-secondary{
  background:var(--surface);color:var(--ink);
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
}
.btn-secondary:hover{border-color:var(--border2);background:var(--surface2)}
.btn-success{background:#1a6632;color:#fff;border:1px solid #1a6632}
.btn-success:hover{opacity:.88}
.btn-link{background:#1a3d7c;color:#fff;border:1px solid #1a3d7c}
.btn-link:hover{opacity:.88}
.btn-sm{padding:.3rem .7rem;font-size:.78rem}

/* ── KPI Cards ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.9rem;margin-bottom:1.6rem}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);
  border-top:2.5px solid var(--pine);border-radius:var(--r-lg);
  padding:1.1rem 1rem;box-shadow:var(--shadow-sm);
}
.kpi-card.blue{border-top-color:#1a3d7c}
.kpi-card.green{border-top-color:#1a6632}
.kpi-card.yellow{border-top-color:#8a6800}
.kpi-card.purple{border-top-color:#4a2070}
.kpi-value{font-size:1.9rem;font-weight:700;letter-spacing:-.04em;color:var(--ink);line-height:1}
.kpi-label{font-size:.7rem;color:var(--ink3);margin-top:.35rem;letter-spacing:.01em}

/* ── Filter Bar ── */
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.1rem;align-items:center}
.filter-bar input,.filter-bar select{
  background:var(--surface);border:1px solid var(--border);
  color:var(--ink);padding:.45rem .8rem;border-radius:var(--r-md);
  outline:none;transition:border .12s;box-shadow:var(--shadow-sm);
  font-size:.84rem;
}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--pine)}
.filter-bar input{min-width:200px}
.filter-bar input::placeholder{color:var(--ink4)}

/* ── Table ── */
.table-wrap{
  background:var(--surface);border-radius:var(--r-lg);
  border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm);
}
table{width:100%;border-collapse:collapse}
thead th{
  background:var(--surface2);padding:.55rem .85rem;
  text-align:left;font-size:.68rem;font-weight:700;
  color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:.6rem .85rem;font-size:.84rem;vertical-align:middle}
.td-muted{color:var(--ink3);font-size:.75rem}

/* ── Link Button ── */
.link-btn{
  display:inline-flex;align-items:center;gap:.3rem;
  padding:.2rem .6rem;background:#e8f0e8;
  color:var(--pine);border:1px solid var(--sage-light);
  border-radius:var(--r-sm);font-size:.72rem;font-weight:600;
  text-decoration:none;white-space:nowrap;transition:all .14s;
}
.link-btn:hover{background:var(--pine);color:#fff;border-color:var(--pine)}
.link-btn-none{color:var(--ink4);font-size:.72rem;font-style:italic}

/* ── Status Pills ── */
.status-pill{
  display:inline-block;padding:.18rem .6rem;
  border-radius:20px;font-size:.68rem;font-weight:700;white-space:nowrap;
}
.s-neu{background:#fdf5dc;color:#8a6800;border:1px solid #e8d080}
.s-bestellt{background:#eef2fb;color:#1a3d7c;border:1px solid #b8c8f0}
.s-angekommen{background:#e8f0e8;color:#1a6632;border:1px solid var(--sage-light)}
.s-warte{background:#f5f0fa;color:#4a2070;border:1px solid #c8b0e8}

/* ── Form ── */
.form-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:1.6rem;
  box-shadow:var(--shadow-sm);max-width:760px;
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.form-group{display:flex;flex-direction:column;gap:.3rem}
.form-group.full{grid-column:1/-1}
.form-group label{
  font-size:.67rem;font-weight:700;color:var(--ink3);
  text-transform:uppercase;letter-spacing:.06em;
}
.form-group input,.form-group select,.form-group textarea{
  background:var(--surface);border:1px solid var(--border);
  color:var(--ink);padding:.6rem .9rem;border-radius:var(--r-md);
  outline:none;transition:border .12s;box-shadow:var(--shadow-sm);
  font-size:.9rem;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--pine);box-shadow:0 0 0 3px rgba(20,48,27,.08);
}
.form-group textarea{resize:vertical;min-height:70px}
.form-hint{font-size:.7rem;color:var(--ink3)}
.form-actions{display:flex;gap:.7rem;margin-top:1.2rem}

/* ── Stamm lookup ── */
.stamm-result{
  margin-top:.35rem;padding:.55rem .85rem;
  background:#e8f0e8;border:1px solid var(--sage-light);
  border-radius:var(--r-md);font-size:.78rem;color:var(--pine);
}

/* ── Info box ── */
.info-box{
  border-radius:0 var(--r-md) var(--r-md) 0;
  padding:.85rem 1rem;margin-bottom:1.2rem;
  font-size:.82rem;line-height:1.6;
  border-left:3px solid;
}
.info-box.green{background:#e8f0e8;border-color:var(--pine)}
.info-box.blue{background:#eef2fb;border-color:#1a3d7c}
.info-box.red{background:#f8ecea;border-color:var(--burgundy)}

/* ── Auswertung ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.4rem}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:1.3rem;box-shadow:var(--shadow-sm);
}
.stat-card h3{
  font-size:.67rem;font-weight:700;color:var(--ink3);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:.9rem;
}
.bar-row{display:flex;align-items:center;gap:.7rem;margin-bottom:.55rem;font-size:.8rem}
.bar-label{width:105px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.bar-track{flex:1;height:7px;background:var(--surface3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease;background:var(--pine)}
.bar-count{width:28px;text-align:right;color:var(--ink3);font-size:.72rem}

/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(20,48,27,.25);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;backdrop-filter:blur(2px);
}
.modal-overlay.hidden{display:none}
.modal-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:1.8rem;
  width:640px;max-width:95vw;max-height:90vh;
  overflow-y:auto;position:relative;
  box-shadow:var(--shadow-md);
}
.modal-close{
  position:absolute;top:.9rem;right:.9rem;
  color:var(--ink3);font-size:1rem;width:26px;height:26px;
  border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;
  transition:background .12s;
}
.modal-close:hover{background:var(--surface3);color:var(--ink)}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:1.3rem;letter-spacing:-.02em;color:var(--ink)}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.3rem}
.detail-item{display:flex;flex-direction:column;gap:.15rem}
.detail-label{font-size:.67rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}
.detail-value{font-size:.87rem;color:var(--ink)}
.detail-item.full{grid-column:1/-1}

.history-list{margin-top:.9rem}
.history-entry{display:flex;gap:.75rem;padding:.55rem 0;border-bottom:1px solid var(--border);font-size:.75rem}
.history-entry:last-child{border-bottom:none}
.history-ts{color:var(--ink3);white-space:nowrap}
.history-rolle{color:var(--pine);font-weight:700;white-space:nowrap}
.history-text{color:var(--ink)}

/* ── Toast ── */
#toast-container{position:fixed;bottom:1.4rem;right:1.4rem;display:flex;flex-direction:column;gap:.4rem;z-index:2000}
.toast{
  padding:.65rem 1.1rem;border-radius:var(--r-md);
  font-size:.84rem;font-weight:600;
  animation:slideIn .2s ease;box-shadow:var(--shadow-md);
}
.toast-success{background:var(--pine);color:#fff}
.toast-error{background:var(--burgundy);color:#fff}
.toast-info{background:#1a3d7c;color:#fff}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* ── Empty state ── */
.empty-state{text-align:center;padding:3.5rem 2rem;color:var(--ink3)}
.empty-state .e-icon{font-size:2.5rem;margin-bottom:.7rem}
.empty-state p{font-size:.87rem}

/* ── Section heading ── */
.section-heading{
  font-size:.67rem;font-weight:700;color:var(--ink3);
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:.7rem;margin-top:1.4rem;
}

/* ── Workflow steps ── */
.workflow-step{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:.9rem;text-align:center;
  box-shadow:var(--shadow-sm);flex:1;min-width:130px;
}

/* ── Projekte sidebar ── */
#sidebar-projekte .section-heading{
  padding:.3rem .6rem;margin:0 0 .3rem;
}

/* ── Topnav-style role-switch button ── */
#btn-switch-role{
  margin-top:.3rem;padding:.5rem .7rem;
  border-radius:var(--r-md);
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--ink);font-size:.78rem;font-weight:600;
  cursor:pointer;width:100%;text-align:left;
  display:flex;align-items:center;gap:.5rem;
  transition:all .12s;letter-spacing:-.01em;
}
#btn-switch-role:hover{background:var(--surface3);border-color:var(--border2)}

/* ── Pulse animation ── */
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,26,14,.4)}70%{box-shadow:0 0 0 6px rgba(139,26,14,0)}}

@media(max-width:768px){
  #sidebar{display:none}
  .form-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .view{padding:1rem}
}

// Ersetzt api.js — gleiche Schnittstelle, andere Implementierung

const SUPABASE_URL = window.VF_SUPABASE_URL || '';
const SUPABASE_KEY = window.VF_SUPABASE_KEY || '';

let _sb = null;

async function initSupabase() {
  if (_sb) return _sb;
  if (!window.supabase) {
    // Neueres Supabase SDK laden das beide Key-Formate unterstützt
    await new Promise(function(resolve, reject) {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true }
  });
  return _sb;
}

// ── Hilfsfunktionen ───────────────────────────────────────────────
function sbRow2Order(r) {
  return {
    id:            r.id,
    artikelnummer: r.artikelnummer,
    bezeichnung:   r.bezeichnung   || '',
    spez1:         r.spez1         || '',
    spez2:         r.spez2         || '',
    projekt:       r.projekt       || 'Lager',
    status:        r.status        || 'neu/offen',
    lieferant:     r.lieferant     || '',
    link:          r.link          || '',
    kommentar:     r.kommentar     || '',
    preis_netto:   r.preis_netto   || null,
    bestellt_am:   r.bestellt_am   || null,
    geliefert_am:  r.geliefert_am  || null,
    erstellt_von:  r.erstellt_von  || 'Werkstatt',
    datum:         r.datum         || null,
    history:       r.history       || [],
    prio:          r.prio          || false,
    erstellt_am_ts: r.erstellt_am_ts || null,
    erstellt_am:   r.erstellt_am_ts ? r.erstellt_am_ts.slice(0,10) : (r.datum || null),
  };
}

// ── API Objekt (gleiche Schnittstelle wie vorher) ─────────────────
const API = {

  orders: {
    list: async function(params) {
      const sb = await initSupabase();
      let q = sb.from('orders').select('*').order('datum', { ascending: false });
      if (params && params.status)  q = q.eq('status', params.status);
      if (params && params.projekt) q = q.eq('projekt', params.projekt);
      const { data, error } = await q;
      if (error) throw error;
      return (data || []).map(sbRow2Order);
    },

    get: async function(id) {
      const sb = await initSupabase();
      const { data, error } = await sb.from('orders').select('*').eq('id', id).single();
      if (error) throw error;
      return sbRow2Order(data);
    },

    create: async function(body) {
      const sb = await initSupabase();
      const now = new Date().toISOString().slice(0, 10);
      const row = {
        artikelnummer: body.artikelnummer || '9999',
        bezeichnung:   body.bezeichnung   || '',
        spez1:         body.spez1         || '',
        spez2:         body.spez2         || '',
        projekt:       body.projekt       || 'Lager',
        status:        'neu/offen',
        lieferant:     body.lieferant     || '',
        link:          body.link          || '',
        kommentar:     body.kommentar     || '',
        preis_netto:   body.preis_netto   || null,
        erstellt_von:  body.erstellt_von  || 'Werkstatt',
        prio:          body.prio          || false,
        datum:         now,
        history: [{ ts: now, aktion: 'Erstellt', rolle: body.erstellt_von || 'Werkstatt' }],
      };
      const { data, error } = await sb.from('orders').insert(row).select().single();
      if (error) throw error;
      return sbRow2Order(data);
    },

    update: async function(id, body) {
      const sb = await initSupabase();
      const now = new Date().toISOString().slice(0, 10);

      // History holen und ergänzen
      const { data: existing } = await sb.from('orders').select('history,bestellt_am,geliefert_am').eq('id', id).single();
      const history = existing?.history || [];
      const changes = Object.keys(body).filter(k => k !== 'rolle' && k !== 'history');
      if (changes.length) history.push({ ts: now, aktion: changes.join(', '), rolle: body.rolle || 'System' });

      const update = { ...body, history };
      delete update.rolle;
      if (body.status === 'bestellt'   && !existing?.bestellt_am)  update.bestellt_am  = body.bestellt_am  || now;
      if (body.status === 'angekommen' && !existing?.geliefert_am) update.geliefert_am = now;

      const { data, error } = await sb.from('orders').update(update).eq('id', id).select().single();
      if (error) throw error;
      return sbRow2Order(data);
    },

    remove: async function(id) {
      const sb = await initSupabase();
      const { error } = await sb.from('orders').delete().eq('id', id);
      if (error) throw error;
      return { ok: true };

  stamm: {

    update: async function(id, body) {

  fehlendeSchilder: {

      const { error } = await sb.from('fehlende_schilder').update({ erledigt: true }).eq('erledigt', false);
      if (error) throw error;
    },
  },

  stats: async function() {
    const sb = await initSupabase();
    const [{ data }, { data: stammData }] = await Promise.all([
      sb.from('orders').select('status,projekt,lieferant,datum,bestellt_am,geliefert_am,prio,artikelnummer'),
      sb.from('stamm').select('nr,preis_netto'),
    ]);
    const stammPreis = {};
    (stammData||[]).forEach(function(s){ if(s.preis_netto) stammPreis[s.nr] = parseFloat(s.preis_netto); });
    const o = data || [];
    const heute = new Date().toISOString().slice(0,10);
    const vor7  = new Date(Date.now() - 7*864e5).toISOString().slice(0,10);
    const vor30 = new Date(Date.now() - 30*864e5).toISOString().slice(0,10);

    const s = {
      gesamt: o.length, neu_offen: 0, bestellt: 0, angekommen: 0, wartezustand: 0,
      nach_projekt: {}, nach_lieferant: {}, pro_tag: {},
      prio_offen: 0, unbekannt_offen: 0, heute_eingelesen: 0, letzte7: 0, letzte30: 0,
      durchlaufzeiten: [],
      kosten_pro_projekt: {},
    };

    o.forEach(function(x) {
      if (x.status === 'neu/offen')     s.neu_offen++;
      else if (x.status === 'bestellt')     s.bestellt++;
      else if (x.status === 'angekommen')   s.angekommen++;
      else if (x.status === 'Wartezustand') s.wartezustand++;

      var p = x.projekt  || '-'; s.nach_projekt[p]   = (s.nach_projekt[p]   || 0) + 1;
      var preis = stammPreis[x.artikelnummer]; if (preis) s.kosten_pro_projekt[p] = (s.kosten_pro_projekt[p] || 0) + preis;
      var l = x.lieferant|| '-'; s.nach_lieferant[l] = (s.nach_lieferant[l] || 0) + 1;
      var d = x.datum    || '-'; s.pro_tag[d]        = (s.pro_tag[d]        || 0) + 1;

      // Prio offen
      if (x.prio && (x.status === 'neu/offen' || x.status === 'Wartezustand')) s.prio_offen++;
      // 9999 offen
      if (x.artikelnummer === '9999' && x.status === 'neu/offen') s.unbekannt_offen++;
      // Heute eingelesen
      if (x.datum === heute) s.heute_eingelesen++;
      // Letzte 7/30 Tage
      if (x.datum >= vor7)  s.letzte7++;
      if (x.datum >= vor30) s.letzte30++;
      // Durchlaufzeit
      if (x.bestellt_am && x.geliefert_am) {
        var tage = Math.round((new Date(x.geliefert_am) - new Date(x.bestellt_am)) / 864e5);
        if (tage >= 0 && tage < 180) s.durchlaufzeiten.push(tage);
      }
    });

    // Ø Durchlaufzeit
    s.avg_durchlauf = s.durchlaufzeiten.length
      ? Math.round(s.durchlaufzeiten.reduce(function(a,b){return a+b;},0) / s.durchlaufzeiten.length)
      : null;

    // Erledigungsrate
    s.erledigungsrate = s.gesamt > 0 ? Math.round(s.angekommen / s.gesamt * 100) : 0;

    return s;
  },

  checkVersion: async function() { return false; },
};

async function renderDashboard() {

    if (role === 'einkauf' && is9999)
      actionBtn = `<button class="btn btn-secondary btn-sm" onclick="pflege9999Workflow('${o.id}','')">📋 Aufarbeiten</button>`;
    if (role === 'einkauf' && o.status === 'Wartezustand')

    return `<tr>

      </td>
      <td style="overflow:hidden"><span style="font-size:.75rem;font-weight:700;color:var(--pine-mid);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(o.projekt)}</span></td>
      <td>${statusPill(o.status)}</td>
      <td style="white-space:nowrap">${actionBtn}</td>
    </tr>`;
  }).join('');

  // KPI je Rolle
  const kpis = role === 'warenannahme'
    ? [
        { val: stats.bestellt,     label: '⬆ Ausstehend',    cls: 'blue'   },
        { val: stats.angekommen,   label: '✓ Angekommen',     cls: 'green'  },
        { val: stats.wartezustand, label: '⏳ Teillieferung', cls: 'yellow' },
      ]
    : role === 'werkstatt'
      ? [
          { val: stats.neu_offen,  label: '● Offen',      cls: ''      },
          { val: stats.bestellt,   label: '⬆ Bestellt',   cls: 'blue'  },
          { val: stats.angekommen, label: '✓ Angekommen', cls: 'green' },
        ]
      : [
          { val: stats.neu_offen,    label: '● Offen',      cls: ''       },
          { val: stats.bestellt,     label: '⬆ Bestellt',   cls: 'blue'   },
          { val: stats.angekommen,   label: '✓ Angekommen', cls: 'green'  },
          { val: stats.wartezustand, label: '⏳ Warten',    cls: 'yellow' },
        ];

  const kpiHtml = kpis.map(k =>
    `<div class="kpi-card ${k.cls}">
      <div class="kpi-value">${k.val}</div>
      <div class="kpi-label">${k.label}</div>

  // Schnellzugriff je Rolle

          <tbody>${rows}</tbody>
        </table>
      </div>
      ${meine.length >= 10 ? `<p style="margin-top:.7rem;font-size:.78rem;color:var(--ink3)">
        <a href="#" onclick="switchView('${role==='warenannahme'?'warenannahme':'bestellungen'}');return false" style="color:var(--pine);font-weight:600">Alle anzeigen →</a>
      </p>` : ''}
    ` : `<div class="empty-state"><div class="e-icon">🎉</div><p>Alles erledigt!</p></div>`}
  `;
}

let _orders = [];
let _sortCol = 'datum';
let _sortDir = -1;
let _savedFilter = {};
let _einkaufView = 'tabelle'; // 'tabelle' | 'lieferant'

// ── Spalten-Konfiguration ─────────────────────────────────────────
const COLS_CONFIG = [
  { key: 'artikelnummer', label: 'Art.-Nr.',   roles: ['werkstatt','einkauf','warenannahme'], defaultOn: true  },
  { key: 'bezeichnung',   label: 'Bezeichnung', roles: ['werkstatt','einkauf','warenannahme'], defaultOn: true  },
  { key: 'projekt',       label: 'Projekt',     roles: ['werkstatt','einkauf','warenannahme'], defaultOn: true  },
  { key: 'status',        label: 'Status',      roles: ['werkstatt','einkauf','warenannahme'], defaultOn: true  },
  { key: 'lieferant',     label: 'Lieferant',   roles: ['einkauf','warenannahme'],             defaultOn: true  },
  { key: 'link',          label: 'Bezugsweg',   roles: ['einkauf','warenannahme'],             defaultOn: true  },
  { key: 'datum',         label: 'Eingetragen', roles: ['werkstatt','einkauf','warenannahme'],  defaultOn: true  },
  { key: 'bestellt_am',   label: 'Bestellt am', roles: ['werkstatt','einkauf','warenannahme'], defaultOn: false },
  { key: 'kommentar',     label: 'Kommentar',   roles: ['einkauf'],                            defaultOn: true  },
];

function getColPrefs(role) {
  try { const s = localStorage.getItem('vf_cols_' + role); if (s) return JSON.parse(s); } catch(_) {}
  const prefs = {};
  COLS_CONFIG.forEach(c => { prefs[c.key] = c.defaultOn; });
  return prefs;
}
function saveColPrefs(role, prefs) {
  try { localStorage.setItem('vf_cols_' + role, JSON.stringify(prefs)); } catch(_) {}
}
function visibleCols(role) {
  const prefs = getColPrefs(role);
  return COLS_CONFIG.filter(c => c.roles.includes(role) && prefs[c.key] !== false);
}

function linkBtn(link) {
  if (!link || link === 'Link' || link === '0' || !link.trim()) return '<span style="color:var(--ink4);font-size:.72rem">–</span>';
  if (link.startsWith('http')) return `<a class="link-btn" href="${esc(link)}" target="_blank" rel="noopener">&#128279; Öffnen</a>`;
  return `<span style="font-size:.72rem;font-weight:600;color:#4a2070;background:#f5f0fa;border:1px solid #c8b0e8;border-radius:5px;padding:.15rem .5rem">${esc(link)}</span>`;
}

const STATUS_ORDER = { 'neu/offen': 0, 'bestellt': 1, 'Wartezustand': 2, 'angekommen': 3 };
function sortOrders(orders, col, dir) {
  return [...orders].sort((a, b) => {
    let av = a[col] || '', bv = b[col] || '';
    if (col === 'status') { av = STATUS_ORDER[av] ?? 9; bv = STATUS_ORDER[bv] ?? 9; }
    if (av < bv) return -dir;
    if (av > bv) return dir;
    // Tiebreaker: immer nach Erfassungszeit (neueste zuerst)
    const at = a.erstellt_am_ts || a.datum || '';
    const bt = b.erstellt_am_ts || b.datum || '';
    if (at < bt) return 1; if (at > bt) return -1; return 0;
  });
}
function setSortCol(col) {
  if (_sortCol === col) _sortDir *= -1; else { _sortCol = col; _sortDir = col === 'status' ? 1 : -1; }
  filterOrders();
}
function sortIcon(col) {
  if (_sortCol !== col) return '<span style="opacity:.25;font-size:.6rem">⬍</span>';
  return _sortDir === 1 ? '<span style="font-size:.65rem">▲</span>' : '<span style="font-size:.65rem">▼</span>';
}

  const role = (window.APP && window.APP.role) || 'einkauf';
  try { _savedFilter = JSON.parse(localStorage.getItem('vf_filter_' + role) || '{}'); } catch(e) { _savedFilter = {}; }
  const saved = _savedFilter;
  _orders = await API.orders.list();
  if (_einkaufView === 'lieferant' && window.APP.role === 'einkauf') {
    renderLieferantView();
  } else {
    renderOrderTable(sortOrders(_orders, _sortCol, _sortDir));
  }
}

function renderOrderTable(orders) {
  const el   = document.getElementById('view-bestellungen');
  const role = window.APP.role;
  const cols = visibleCols(role);
  const offen9999 = _orders.filter(o => o.artikelnummer === '9999' && o.status === 'neu/offen').length;
  window._offen9999 = offen9999;

  const curSearch  = document.getElementById('f-search')?.value  || _savedFilter.search  || '';
  const curStatus  = document.getElementById('f-status')?.value  || _savedFilter.status  || '';
  const curProjekt = document.getElementById('f-projekt')?.value || _savedFilter.projekt || '';
  const cur9999    = document.getElementById('f-9999')?.checked  || false;

  const rows = orders.map(o => {
    const is9999 = o.artikelnummer === '9999';
    const age = o.datum ? Math.floor((Date.now() - new Date(o.datum)) / 86400000) : null;
    const oldMark = age > 7 && o.status === 'neu/offen'
      ? `<span style="color:var(--burgundy);font-size:.68rem;margin-left:.3rem;font-weight:700">⚠${age}d</span>` : '';

    const cellMap = {
      artikelnummer: `<code style="font-size:.76rem;font-weight:${is9999?'800':'600'};color:${is9999?'var(--burgundy)':'var(--pine)'};background:${is9999?'rgba(139,26,14,.07)':'var(--surface2)'};padding:.1rem .4rem;border-radius:4px">${esc(o.artikelnummer)}</code>`,
      bezeichnung: `<div style="font-weight:${o.prio?'700':'600'};cursor:pointer;color:${o.prio?'var(--burgundy)':'var(--pine)'}" onclick="showOrderDetail('${o.id}')">${o.prio?'▲ ':''}${esc(o.bezeichnung.slice(0,42))}${o.bezeichnung.length>42?'…':''}</div>${o.spez1||o.spez2?`<div style="color:var(--ink3);font-size:.74rem">${esc(o.spez1)}${o.spez2?' · '+esc(o.spez2):''}</div>`:''}`,
      projekt: `<span style="font-size:.76rem;font-weight:700;color:var(--pine-mid)">${esc(o.projekt)}</span>`,
      status: `${statusPill(o.status)}${oldMark}`,
      lieferant: `<span style="font-size:.8rem;color:var(--ink3)">${esc((o.lieferant||'').slice(0,18))}</span>`,
      link: linkBtn(o.link),
      datum: `<span style="font-size:.78rem;color:var(--ink3)">${fmtDate(o.datum)}</span>`,
      bestellt_am: `<span style="font-size:.78rem;color:var(--ink3)">${fmtDate(o.bestellt_am)}</span>`,
      kommentar: `<span style="font-size:.76rem;color:var(--ink3)">${esc((o.kommentar||'').slice(0,30))}</span>`,
    };

    const actionBtns = [
      `<button title="${o.prio?'Prio entfernen':'Als dringend markieren'}"
        style="width:28px;height:28px;padding:0;border:1.5px solid ${o.prio?'var(--burgundy)':'var(--border)'};border-radius:var(--r-md);background:${o.prio?'rgba(139,26,14,.12)':'var(--surface)'};color:${o.prio?'var(--burgundy)':'var(--ink4)'};cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center"
        onclick="togglePrio('${o.id}',${!o.prio})">&#9650;</button>`,
      `<button class="btn btn-secondary btn-sm" style="width:28px;height:28px;padding:0;justify-content:center;font-size:.95rem" title="Details" onclick="showOrderDetail('${o.id}')">🔍</button>`,
      !is9999 ? `<button class="btn btn-secondary btn-sm" style="width:28px;height:28px;padding:0;justify-content:center;font-size:.95rem" title="Stammdaten nachpflegen" onclick="stammPflegenModal('${o.artikelnummer}')">📝</button>` : '',
      role==='einkauf' ? `<button class="btn btn-secondary btn-sm" style="width:28px;height:28px;padding:0;justify-content:center;font-size:.95rem" title="Bearbeiten" onclick="editOrder('${o.id}')">✏</button>` : '',
      role==='einkauf' && is9999 ? `<button class="btn btn-primary btn-sm" onclick="pflege9999Workflow('${o.id}','')">📋 Aufarbeiten</button>` : '',
      role==='einkauf' && !is9999 && o.status==='neu/offen' ? `<button class="btn btn-primary btn-sm" onclick="markBestellt('${o.id}')">→ Bestellen</button>` : '',
      role==='warenannahme' && o.status==='bestellt' ? `<button class="btn btn-success btn-sm" onclick="markAngekommen('${o.id}')">✓ Einbuchen</button>` : '',
      `<button class="btn btn-secondary btn-sm" style="width:28px;height:28px;padding:0;justify-content:center;font-size:.95rem;color:var(--burgundy)" title="Löschen" onclick="deleteOrder('${o.id}','${esc(o.bezeichnung.slice(0,30))}')">&#128465;</button>`,
    ].filter(Boolean).join('');

    const trStyle = o.prio
      ? 'background:rgba(139,26,14,.07);border-left:3px solid var(--burgundy);'
      : is9999 ? 'background:rgba(139,26,14,.03);' : '';
    return `<tr style="${trStyle}">
      ${cols.map(c => `<td>${cellMap[c.key]||''}</td>`).join('')}
      <td><div style="display:flex;gap:.3rem;flex-wrap:wrap">${actionBtns}</div></td>
    </tr>`;
  }).join('');

  const thCols = cols.map(c => `
    <th style="cursor:pointer;user-select:none;white-space:nowrap" onclick="setSortCol('${c.key}')">
      ${c.label} ${sortIcon(c.key)}
    </th>`).join('');

  const viewToggle = role === 'einkauf' ? `
    <div style="display:flex;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden">
      <button onclick="_einkaufView='tabelle';renderBestellungen()" style="padding:.3rem .7rem;font-size:.75rem;font-weight:600;border:none;cursor:pointer;background:${_einkaufView==='tabelle'?'var(--pine)':'var(--surface)'};color:${_einkaufView==='tabelle'?'#fff':'var(--ink3)'}">Tabelle</button>
      <button onclick="_einkaufView='lieferant';renderBestellungen()" style="padding:.3rem .7rem;font-size:.75rem;font-weight:600;border:none;cursor:pointer;background:${_einkaufView==='lieferant'?'var(--pine)':'var(--surface)'};color:${_einkaufView==='lieferant'?'#fff':'var(--ink3)'}">Nach Lieferant</button>
    </div>` : '';

  el.innerHTML = `
    <div class="page-header">
      <div class="page-title">Bestellungen <span>${orders.length} Einträge</span></div>
      <div class="page-actions">
        ${role==='einkauf' && offen9999>0 ? `<button class="btn btn-primary btn-sm" onclick="showQueue9999()" style="animation:pulse 2s infinite">⚠ ${offen9999} unbekannte Artikel</button>` : ''}
        ${viewToggle}
        <button class="btn btn-secondary btn-sm" onclick="openColPicker()">⚙ Spalten</button>
        <a href="/api/export/csv" class="btn btn-secondary btn-sm">⬇ CSV</a>
      </div>
    </div>
    <div class="filter-bar">
      <input type="search" id="f-search" placeholder="🔍 Suchen…" value="${esc(curSearch)}" oninput="filterOrders()">
      <select id="f-status" onchange="filterOrders()">
        <option value="">Alle Status</option>
        ${['neu/offen','bestellt','angekommen','Wartezustand'].map(s=>`<option${curStatus===s?' selected':''}>${s}</option>`).join('')}
      </select>
      <select id="f-projekt" onchange="filterOrders()">
        <option value="">Alle Projekte</option>
        ${aktiveProjekte().map(p=>`<option${curProjekt===p.name?' selected':''}>${esc(p.name)}</option>`).join('')}
      </select>
      ${role==='einkauf'?`<label style="display:flex;align-items:center;gap:.35rem;font-size:.8rem;color:var(--ink3);cursor:pointer"><input type="checkbox" id="f-9999" ${cur9999?'checked':''} onchange="filterOrders()"> Nur 9999</label>`:''}
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>${thCols}<th></th></tr></thead>
        <tbody>${rows || `<tr><td colspan="${cols.length+1}"><div class="empty-state"><div class="e-icon">📭</div><p>Keine Einträge.</p></div></td></tr>`}</tbody>
      </table>
    </div>`;
}

function filterOrders() {
  if (_einkaufView === 'lieferant' && window.APP.role === 'einkauf') { renderLieferantView(); return; }
  const q  = document.getElementById('f-search')?.value.toLowerCase()||'';
  const st = document.getElementById('f-status')?.value||'';
  const pr = document.getElementById('f-projekt')?.value||'';
  const n9 = document.getElementById('f-9999')?.checked||false;
  let f = _orders;
  if (q)  f = f.filter(o=>(o.bezeichnung||'').toLowerCase().includes(q)||(o.artikelnummer||'').includes(q)||(o.lieferant||'').toLowerCase().includes(q));
  if (st) f = f.filter(o=>o.status===st);
  if (pr) f = f.filter(o=>o.projekt===pr);
  if (n9) f = f.filter(o=>o.artikelnummer==='9999');
  renderOrderTable(sortOrders(f, _sortCol, _sortDir));
}

// ── Lieferanten-Gruppenansicht ────────────────────────────────────
function renderLieferantView() {
  const el = document.getElementById('view-bestellungen');
  const role = window.APP.role;
  const offen9999 = _orders.filter(o => o.artikelnummer === '9999' && o.status === 'neu/offen').length;
  const relevant = _orders.filter(o => o.status === 'neu/offen' || o.status === 'Wartezustand');

  const gruppen = {};
  relevant.forEach(o => {
    const key = (o.lieferant || '').trim() || '__kein__';
    if (!gruppen[key]) gruppen[key] = [];
    gruppen[key].push(o);
  });

  const keys = Object.keys(gruppen).sort((a,b) => {
    if (a === '__kein__') return 1; if (b === '__kein__') return -1;
    // Prio-Gruppen zuerst
    const aPrio = gruppen[a].some(o => o.prio);
    const bPrio = gruppen[b].some(o => o.prio);
    if (aPrio && !bPrio) return -1;
    if (!aPrio && bPrio) return 1;
    return a.localeCompare(b, 'de');
  });

  const viewToggle = `
    <div style="display:flex;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden">
      <button onclick="_einkaufView='tabelle';renderBestellungen()" style="padding:.3rem .7rem;font-size:.75rem;font-weight:600;border:none;cursor:pointer;background:var(--surface);color:var(--ink3)">Tabelle</button>
      <button onclick="_einkaufView='lieferant';renderBestellungen()" style="padding:.3rem .7rem;font-size:.75rem;font-weight:600;border:none;cursor:pointer;background:var(--pine);color:#fff">Nach Lieferant</button>
    </div>`;

  let gruppenHtml = '';
  keys.forEach((key, gi) => {
    const items = sortOrders(gruppen[key], 'status', 1);
    const isKein = key === '__kein__';
    const label  = isKein ? 'Kein Lieferant eingetragen' : key;
    const offen  = items.filter(o => o.status === 'neu/offen' && o.artikelnummer !== '9999').length;
    const hat9999 = items.some(o => o.artikelnummer === '9999');
    const hatPrio = items.some(o => o.prio);
    const isSingle = items.length === 1; // Einzelartikel → direkt aufgeklappt

    const rows = items.map(o => {
      const is9999 = o.artikelnummer === '9999';
      const spez1ok = o.spez1 && o.spez1.trim() && o.spez1 !== '0';
      const spez2ok = o.spez2 && o.spez2.trim() && o.spez2 !== '0';
      const spezStr = [spez1ok?o.spez1:'', spez2ok?o.spez2:''].filter(Boolean).join(' · ');
      const prioStyle = o.prio ? 'background:rgba(139,26,14,.08);border-left:4px solid var(--burgundy);padding-left:calc(.55rem - 1px);' : '';

      return `<div style="display:flex;align-items:center;gap:.7rem;padding:.55rem 1rem;border-bottom:0.5px solid var(--border);${prioStyle}">
        ${o.prio ? '<span title="Dringend" style="color:var(--burgundy);font-size:.9rem;flex-shrink:0">&#9650;</span>' : '<span style="width:.9rem;flex-shrink:0"></span>'}
        <code style="font-size:.75rem;font-weight:700;color:${is9999?'var(--burgundy)':'var(--pine)'};background:${is9999?'rgba(139,26,14,.07)':'var(--surface2)'};padding:.1rem .4rem;border-radius:4px;min-width:40px;text-align:center">${esc(o.artikelnummer)}</code>
        <div style="flex:1;min-width:0;cursor:pointer" onclick="showOrderDetail('${o.id}')">
          <div style="font-size:.84rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;${o.prio?'font-weight:700;color:var(--burgundy)':'font-weight:600'}">${esc(o.bezeichnung)}</div>
          ${spezStr ? `<div style="font-size:.71rem;color:var(--ink3)">${esc(spezStr)}</div>` : ''}
        </div>
        <span style="font-size:.72rem;color:var(--pine-mid);font-weight:600;white-space:nowrap">${esc(o.projekt)}</span>
        ${statusPill(o.status)}
        ${linkBtn(o.link)}
        <div style="display:flex;gap:.3rem;flex-shrink:0">
          <button title="${o.prio?'Prio entfernen':'Als dringend markieren'}"
            style="width:28px;height:28px;border:1.5px solid ${o.prio?'var(--burgundy)':'var(--border)'};border-radius:var(--r-md);background:${o.prio?'rgba(139,26,14,.12)':'var(--surface)'};color:${o.prio?'var(--burgundy)':'var(--ink4)'};cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center"
            onclick="togglePrio('${o.id}',${!o.prio})">&#9650;</button>
          ${is9999 ? `<button class="btn btn-primary btn-sm" onclick="pflege9999Workflow('${o.id}','')">&#128203; Aufarbeiten</button>` : ''}
          ${!is9999 && o.status==='neu/offen' ? `<button class="btn btn-primary btn-sm" onclick="markBestellt('${o.id}')">&#8594; Bestellen</button>` : ''}
          ${!is9999 ? `<button class="btn btn-secondary btn-sm" style="width:28px;height:28px;padding:0;justify-content:center;font-size:.95rem" title="Stammdaten" onclick="stammPflegenModal('${o.artikelnummer}')">&#128221;</button>` : ''}
          <button class="btn btn-secondary btn-sm" style="width:28px;height:28px;padding:0;justify-content:center;font-size:.95rem;color:var(--burgundy)" title="Löschen" onclick="deleteOrder('${o.id}','${esc(o.bezeichnung.slice(0,30))}')">&#128465;</button>
        </div>
      </div>`;
    }).join('');

    const groupId = 'lief-group-' + gi;
    gruppenHtml += `
    <div style="border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:8px;overflow:hidden${hatPrio?';box-shadow:0 0 0 2px var(--burgundy)':''}" id="${groupId}">
      <div style="display:flex;align-items:center;gap:.7rem;padding:.6rem 1rem;background:var(--surface2);cursor:${isSingle?'default':'pointer'}"
        onclick="${isSingle ? '' : `toggleAkkordeon('${groupId}')`}">
        <span style="font-size:.82rem;flex-shrink:0">&#127981;</span>
        <span style="font-size:.87rem;font-weight:${hatPrio||isKein?'700':'600'};flex:1;color:${isKein?'var(--burgundy)':hatPrio?'var(--burgundy)':'var(--ink)'}">${isKein?'&#9888;&nbsp;':hatPrio?'&#9650;&nbsp;':''}${esc(label)}</span>
        <span style="font-size:.7rem;color:var(--ink3)">${items.length} Artikel</span>
        ${offen > 0 ? `<span style="background:var(--burgundy);color:#fff;font-size:.64rem;font-weight:700;padding:.12rem .5rem;border-radius:10px">${offen} offen</span>` : ''}
        ${!isKein && offen > 0 && !hat9999 ? `<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();allesBestellenLieferant('${esc(key)}')">Alle bestellen</button>` : ''}
        ${!isSingle ? `<span style="font-size:.7rem;color:var(--ink3);transition:transform .15s" id="${groupId}-chev">&#9654;</span>` : ''}
      </div>
      <div id="${groupId}-body" style="display:${isSingle ? 'block' : 'none'}">${rows}</div>
    </div>`;
  });

  el.innerHTML = `
    <div class="page-header">
      <div class="page-title">Bestellungen nach Lieferant</div>
      <div class="page-actions">
        ${offen9999>0 ? `<button class="btn btn-primary btn-sm" onclick="showQueue9999()" style="animation:pulse 2s infinite">&#9888; ${offen9999} unbekannte Artikel</button>` : ''}
        ${viewToggle}
      </div>
    </div>
    <div style="font-size:.78rem;color:var(--ink3);margin-bottom:1rem">
      Nur <strong>offene</strong> und <strong>Wartezustand</strong>-Artikel. &#9650; = dringend.
    </div>
    ${gruppenHtml || '<div class="empty-state"><div class="e-icon">&#127881;</div><p>Alles erledigt!</p></div>'}`;
}

function toggleAkkordeon(groupId) {
  const body = document.getElementById(groupId + '-body');
  const chev = document.getElementById(groupId + '-chev');
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if (chev) chev.style.transform = isOpen ? '' : 'rotate(90deg)';
}

async function togglePrio(id, prio) {
  try {
    await API.orders.update(id, { prio });
    renderBestellungen();
  } catch(e) { handleError(e, 'Fehler beim Speichern'); }
}


// ── Stammdaten direkt nachpflegen aus Lieferantenansicht ──────────
async function stammPflegenModal(nr) {
  if (!nr || nr === '9999') { toast('9999-Artikel haben keine Stammdaten — bitte über "Aufarbeiten" vorgehen', 'info'); return; }
  let stamm;
  try { stamm = await API.stamm.list(); } catch(_) { toast('Stamm nicht ladbar', 'error'); return; }
  const e = stamm[nr] || {};  // leeres Objekt wenn nicht im Stamm → Neuanlage
  const istNeu = !stamm[nr];

  openModal(
    `<div class="modal-title">📝 Stammdaten — ${esc(nr)}</div>
    ${istNeu ? `<div style="background:#eef2fb;border-left:3px solid #1a3d7c;padding:.6rem .9rem;border-radius:0 var(--r-md) var(--r-md) 0;margin-bottom:1rem;font-size:.78rem;color:var(--ink3)">
      ℹ Artikel <strong>${esc(nr)}</strong> ist noch nicht im Stamm — wird beim Speichern neu angelegt.
    </div>` : ''}

      <div class="form-group full"><label>Bezeichnung</label><input id="st-bez" value="${esc(e.bezeichnung||'')}"></div>
      <div class="form-group"><label>Spezifikation 1</label><input id="st-s1" value="${esc(e.spez1||'')}"></div>
      <div class="form-group"><label>Spezifikation 2</label><input id="st-s2" value="${esc(e.spez2||'')}"></div>

      <div class="form-group full">
        <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;text-transform:none;font-size:.85rem;font-weight:500;letter-spacing:0">

        <div>
          <label style="font-size:.7rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:.3rem">EE-Preis eingeben</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
            <div>
              <div style="font-size:.68rem;color:var(--ink3);margin-bottom:.2rem">Brutto (€)</div>
              <input type="number" id="st-brutto" step="0.01" min="0" placeholder="39.60"
                value="${e.hilfsspalte_brutto!=null?e.hilfsspalte_brutto:''}"
                oninput="stammPreisBerechnen()"
                style="width:100%;padding:.45rem .6rem;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:.88rem;background:var(--surface);color:var(--ink)">
            </div>
            <div>
              <div style="font-size:.68rem;color:var(--ink3);margin-bottom:.2rem">Netto (€)</div>

function stammPreisBerechnen() {
  var brutto   = parseFloat(document.getElementById('st-brutto')?.value) || null;
  var nettoDi  = parseFloat(document.getElementById('st-netto-direkt')?.value) || null;
  var mengeEE  = parseFloat(document.getElementById('st-menge-ee')?.value) || null;
  var mengeVE  = parseFloat(document.getElementById('st-menge-ve')?.value) || null;

  // Preis EE netto: brutto/1.19 wenn brutto, sonst netto direkt
  var preisEE = null;
  if (brutto != null) preisEE = brutto / 1.19;
  else if (nettoDi != null) preisEE = nettoDi;

  var eeHidden = document.getElementById('st-preis-ee');
  var eeDisplay = document.getElementById('st-preis-ee-display');
  if (eeHidden)  eeHidden.value = preisEE != null ? preisEE.toFixed(6) : '';
  if (eeDisplay) eeDisplay.textContent = preisEE != null ? preisEE.toFixed(4) + ' €' : '–';

  var preisVE = null;
  var effMengeEE = mengeEE || 1;
  var effMengeVE = mengeVE || 1;
  if (preisEE != null) {
    preisVE = preisEE / effMengeEE * effMengeVE;
  }
  var veHidden  = document.getElementById('st-preis-ve');
  var veDisplay = document.getElementById('st-preis-ve-display');
  if (veHidden)  veHidden.value = preisVE != null ? preisVE.toFixed(6) : '';
  if (veDisplay) veDisplay.textContent = preisVE != null ? preisVE.toFixed(4) + ' €' : '–';
  var vkEl = document.getElementById('st-vk-brutto');
  if (vkEl) vkEl.textContent = preisVE != null ? (preisVE * 1.56).toFixed(2) + ' €' : '–';
}

async function stammPflegenSave(nr, istNeu) {
  const bruttoVal  = parseFloat(document.getElementById('st-brutto')?.value) || null;
  const nettoDir   = parseFloat(document.getElementById('st-netto-direkt')?.value) || null;
  const preisEE    = parseFloat(document.getElementById('st-preis-ee')?.value) || null;
  const preisVE    = parseFloat(document.getElementById('st-preis-ve')?.value) || null;
  const mengeEE    = parseFloat(document.getElementById('st-menge-ee')?.value) || null;
  const mengeVE    = parseFloat(document.getElementById('st-menge-ve')?.value) || null;
  const body = {
    bezeichnung:           document.getElementById('st-bez')?.value.trim() || '',
    spez1:                 document.getElementById('st-s1')?.value.trim() || '',
    spez2:                 document.getElementById('st-s2')?.value.trim() || '',
    lieferant:             document.getElementById('st-lief')?.value.trim() || '',
    nachbestellmenge:      parseFloat(document.getElementById('st-menge')?.value)||null,
    hilfsspalte_brutto:    bruttoVal,
    hilfsspalte_netto:     nettoDir,
    preis_netto:           preisEE,
    menge_einkaufseinheit: mengeEE,
    menge_verkaufseinheit: mengeVE,
    preis_ve_netto:        preisVE,
    link:                  document.getElementById('st-link')?.value.trim() || '',
  };
  if (!body.bezeichnung) { toast('Bezeichnung ist Pflicht', 'error'); return; }
  try {
    if (istNeu) {
      await API.stamm.add(nr, body);
      toast('Artikel ' + nr + ' im Stamm angelegt ✓');
    } else {
      await API.stamm.update(nr, body);
      toast('Stammdaten gespeichert ✓');
    }
    // Alle offenen Bestellungen mit dieser Artikelnummer aktualisieren (Bezeichnung, Lieferant, Link)
    var offeneBestellungen = _orders.filter(function(o) {
      return o.artikelnummer === nr && (o.status === 'neu/offen' || o.status === 'Wartezustand');
    });
    if (offeneBestellungen.length > 0) {
      var updateFields = {};
      if (body.bezeichnung) updateFields.bezeichnung = body.bezeichnung;
      if (body.spez1 !== undefined) updateFields.spez1 = body.spez1;
      if (body.spez2 !== undefined) updateFields.spez2 = body.spez2;
      if (body.lieferant) updateFields.lieferant = body.lieferant;
      if (body.link) updateFields.link = body.link;
      if (Object.keys(updateFields).length > 0) {
        await Promise.all(offeneBestellungen.map(function(o) {
          return API.orders.update(o.id, updateFields);
        }));
      }
    }
    closeModal();
    // Caches leeren
    if (typeof _stammAll !== 'undefined') _stammAll = null;
    if (typeof _lieferantenCache !== 'undefined') _lieferantenCache = null;
    // _orders direkt mit neuen Stammdaten aktualisieren
    _orders = _orders.map(function(o) {
      if (o.artikelnummer !== nr) return o;
      return Object.assign({}, o, {
        bezeichnung: body.bezeichnung || o.bezeichnung,
        spez1:       body.spez1 !== undefined ? body.spez1 : o.spez1,
        spez2:       body.spez2 !== undefined ? body.spez2 : o.spez2,
        lieferant:   body.lieferant || o.lieferant,
        link:        body.link || o.link,
      });
    });
    renderBestellungen();
  } catch(e) { handleError(e, 'Fehler beim Speichern'); }
}

// ── Geführter Aufarbeitungs-Workflow ──────────────────────────────

  const stammKeys = Object.keys(stamm);

  // Suche automatisch nach möglichen Treffern im Stamm (Bezeichnung-Match)
  const bezLC  = (o.bezeichnung || '').toLowerCase().replace(/unbekannt\s*\([^)]+\)/i, '').trim();
  const matches = stammKeys
    .filter(function(nr) {
      const s = stamm[nr];
      return s.bezeichnung && s.bezeichnung.toLowerCase().includes(bezLC.slice(0, 8)) && bezLC.length > 4;
    })
    .slice(0, 5)
    .map(function(nr) { return { nr: nr, bez: stamm[nr].bezeichnung }; });

  // Falls Original-Nr bekannt und im Stamm: direkt vorschlagen

        'value="' + esc(origNr || '') + '" oninput="stammSucheUpdate()">' +
      '<button class="btn btn-secondary btn-sm" onclick="stammSucheUpdate()">Suchen</button>' +
    '</div>' +

  openModal(
    '<div class="modal-title">&#128203; Artikel aufarbeiten</div>' +

    // Info-Box: was wurde eingetragen
    '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:.8rem 1rem;margin-bottom:1.2rem">' +
      '<div style="font-size:.68rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem">Eintrag der Werkstatt</div>' +

        (o.kommentar ? ' &middot; ' + esc(o.kommentar.slice(0, 60)) : '') +
      '</div>' +
    '</div>' +

    // Direkt-Treffer falls vorhanden
    (direktTreffer ? (
      '<div style="background:#e8f0e8;border:1px solid var(--sage-light);border-radius:var(--r-md);padding:.8rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.8rem">' +
        '<span style="font-size:1.2rem">&#10003;</span>' +
        '<div style="flex:1">' +
          '<div style="font-size:.73rem;color:var(--pine);font-weight:700;text-transform:uppercase;letter-spacing:.04em">Wahrscheinlicher Treffer</div>' +
          '<div style="font-weight:600">' + esc(origNr) + ' &mdash; ' + esc(direktTreffer.bezeichnung) + '</div>' +
          '<div style="font-size:.73rem;color:var(--ink3)">' + esc([direktTreffer.spez1, direktTreffer.spez2].filter(Boolean).join(' &middot; ')) + ' &mdash; ' + esc(direktTreffer.lieferant || '') + '</div>' +

        '<div style="font-size:.72rem;color:var(--ink3)">Einmalig, kein Stammartikel &mdash; Preis eintragen</div>' +
      '</div>' +

    '</div>' +

    '<div class="form-actions">' +
      '<button class="btn btn-secondary" onclick="closeModal();showQueue9999()">&#8592; Zur&uuml;ck zur Queue</button>' +
      '<button class="btn btn-secondary" onclick="closeModal()">Sp&auml;ter</button>' +
    '</div>'
  );

  // Event delegation für Direkt-Treffer Button
  setTimeout(function() {
    var assignBtns = document.querySelectorAll('[data-assign-nr]');
    assignBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var nr = this.dataset.assignNr;

// ── Stamm-Suche (Live) ────────────────────────────────────────────
async function stammSucheUpdate() {
  var q = (document.getElementById('pf-stamm-suche')?.value || '').trim().toLowerCase();
  var container = document.getElementById('stamm-suche-results');
  if (!container) return;
  if (!q || q.length < 2) { container.innerHTML = ''; return; }

  var stamm = await getStamm();
  var results = Object.entries(stamm)
    .filter(function(e) {
      return e[0].includes(q) || (e[1].bezeichnung || '').toLowerCase().includes(q);
    })
    .slice(0, 8);

  if (!results.length) {
    container.innerHTML = '<div style="font-size:.78rem;color:var(--ink3);padding:.4rem">Kein Treffer im Stamm.</div>';
    return;
  }

  container.innerHTML = results.map(function(e) {
    var nr = e[0], s = e[1];
    var spez = [s.spez1, s.spez2].filter(Boolean).join(' · ');
    return '<div style="display:flex;align-items:center;gap:.6rem;padding:.4rem .6rem;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);margin-bottom:.25rem;cursor:pointer" ' +
      'onclick="pflegeZuweisenSave(\'' + (window._pflegeOrderId||'') + '\',\'' + esc(nr) + '\')">' +
      '<code style="font-weight:700;font-size:.88rem;color:var(--pine);min-width:40px">' + esc(nr) + '</code>' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-size:.83rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(s.bezeichnung) + '</div>' +
        (spez ? '<div style="font-size:.7rem;color:var(--ink3)">' + esc(spez) + (s.lieferant?' &middot; '+esc(s.lieferant):'') + '</div>' : '') +
      '</div>' +
      '<button class="btn btn-primary btn-sm" style="flex-shrink:0">Zuweisen</button>' +
    '</div>';
  }).join('');
}

async function pflegeZuweisenSave(orderId, nr) {
  if (!nr) { toast('Bitte eine Artikelnummer eingeben', 'error'); return; }
  var stamm = await getStamm();
  var entry = stamm[nr];
  if (!entry) { toast('Artikelnummer ' + nr + ' nicht im Stamm', 'error'); return; }

  try {
    await API.orders.update(orderId, {
      artikelnummer: nr,
      bezeichnung:   entry.bezeichnung,
      spez1:         entry.spez1 || '',
      spez2:         entry.spez2 || '',
      lieferant:     entry.lieferant || '',
      link:          entry.link || '',
      rolle:         'Einkauf',
      kommentar:     'Nummer zugewiesen durch Einkauf',
    });
    closeModal();
    toast('Artikel ' + nr + ' zugewiesen ✓');
    renderBestellungen(); updateBadge();
  } catch(e) { handleError(e, 'Fehler beim Zuweisen'); }
}

      setTimeout(function() {

function switchNeuTab(tab, prefillArtnr) {
  _neuTab = tab;

  // Tab-Styling
  ['kanban','anlegen'].forEach(t => {
    const btn = document.getElementById(`tab-${t}`);
    const content = document.getElementById(`tab-content-${t}`);
    if (!btn || !content) return;
    const active = t === tab;
    btn.style.borderBottomColor = active ? 'var(--pine)' : 'transparent';
    btn.style.color = active ? 'var(--pine)' : 'var(--ink3)';
    content.style.display = active ? 'block' : 'none';
  });

  if (tab === 'anlegen') {
    if (prefillArtnr && prefillArtnr !== '9999') {
      const inp = document.getElementById('an-artnr');
      if (inp) { inp.value = prefillArtnr; checkArtnrFrei(prefillArtnr); }
    }
    document.getElementById('an-bezeichnung')?.focus();
  } else {
    document.getElementById('n-artnr')?.focus();
  }
}

// ── Artikelnummer Verfügbarkeits-Check ───────────────────────────
function checkArtnrFrei(val) {
  const hint = document.getElementById('an-artnr-hint');
  if (!hint) return;
  if (!val || val.length < 2) { hint.innerHTML = ''; return; }
  const exists = _stamm && _stamm[val.trim()];
  if (exists) {
    hint.innerHTML = `<span style="color:var(--pine)">⚠ Artikelnummer bereits vergeben: ${esc(exists.bezeichnung)}</span>`;
  } else {
    hint.innerHTML = `<span style="color:var(--pine)">✓ Frei — kann verwendet werden</span>`;
  }
}

// ── Kanban Lookup ─────────────────────────────────────────────────
function kanbanLookup(val) {
  const nr = val.trim();
  const preview    = document.getElementById('kanban-preview');
  const neuAnlegen = document.getElementById('kanban-neu-anlegen');
  if (!nr || nr.length < 2) {
    if (preview) preview.style.display = 'none';
    if (neuAnlegen) neuAnlegen.style.display = 'none';
    _currentStammEntry = null; return;
  }
  const entry = nr !== '9999' && _stamm && _stamm[nr];
  if (entry && entry.bezeichnung) {
    _currentStammEntry = entry;
    document.getElementById('pv-bez').textContent   = entry.bezeichnung;
    document.getElementById('pv-lief').textContent  = entry.lieferant || '–';
    document.getElementById('pv-spez').textContent  = [entry.spez1, entry.spez2].filter(Boolean).join(' · ') || '–';
    document.getElementById('pv-menge').textContent = entry.nachbestellmenge ? entry.nachbestellmenge + ' Stk.' : '–';
    var pvLink = document.getElementById('pv-link');
    if (pvLink) {
      var lnk = entry.link || '';
      if (lnk && lnk.startsWith('http')) {
        pvLink.innerHTML = '<a href="' + lnk + '" target="_blank" rel="noopener" style="color:var(--pine);font-weight:600">&#128279; Öffnen</a>';
      } else if (lnk && lnk !== '0' && lnk !== 'Link') {
        pvLink.textContent = lnk;
      } else {
        pvLink.textContent = '–';
      }
    }
    if (preview) preview.style.display = 'block';
    if (neuAnlegen) neuAnlegen.style.display = 'none';
  } else if (nr.length >= 3) {
    _currentStammEntry = null;
    if (preview) preview.style.display = 'none';
    if (neuAnlegen) {
      neuAnlegen.style.display = 'block';
      // Projekt-Dropdown dynamisch befüllen
      var sel9999 = document.getElementById('n-projekt-9999');
      if (sel9999 && sel9999.options.length <= 1) {
        sel9999.innerHTML = '<option value="" disabled selected>— Projekt wählen —</option>' + projektOptions('');
      }
    }
  }
}

// ── Freitext-Suche im Stamm ───────────────────────────────────────
function freitextSuche(q) {
  const container = document.getElementById('n-freitext-results');
  if (!container) return;
  q = q.trim().toLowerCase();
  if (!q || q.length < 2) { container.innerHTML = ''; return; }

  const matches = Object.entries(_stamm || {})
    .filter(([nr, e]) =>
      (e.bezeichnung || '').toLowerCase().includes(q) ||
      (e.spez1 || '').toLowerCase().includes(q) ||
      (e.spez2 || '').toLowerCase().includes(q) ||
      nr.includes(q)
    )
    .slice(0, 8);

  if (!matches.length) {
    container.innerHTML = '<div style="font-size:.78rem;color:var(--ink3);padding:.5rem .7rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);margin-top:.3rem">Kein Treffer im Stamm</div>';
    return;
  }

  container.innerHTML =
    '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);margin-top:.3rem;overflow:hidden;box-shadow:var(--shadow-md)">' +
    matches.map(([nr, e]) => {
      const spez = [e.spez1, e.spez2].filter(Boolean).join(' · ');
      return '<div style="padding:.55rem .8rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s" ' +
        'onmouseover="this.style.background=\'var(--surface2)\'" onmouseout="this.style.background=\'\'" ' +
        'onclick="stammTrefferWaehlen(\'' + esc(nr) + '\')">' +
        '<div style="display:flex;align-items:center;gap:.6rem">' +
          '<code style="font-size:.85rem;font-weight:800;color:var(--pine);min-width:42px">' + esc(nr) + '</code>' +
          '<div style="flex:1;min-width:0">' +
            '<div style="font-weight:600;font-size:.83rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(e.bezeichnung) + '</div>' +
            (spez ? '<div style="font-size:.7rem;color:var(--ink3)">' + esc(spez) + (e.lieferant?' · '+esc(e.lieferant):'') + '</div>' : '') +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('') +
    '</div>';
}

function stammTrefferWaehlen(nr) {
  // Nummer ins Nummernfeld übernehmen und Suche auslösen
  const nrInp = document.getElementById('n-artnr');
  const ftInp = document.getElementById('n-freitext');
  if (nrInp) nrInp.value = nr;
  if (ftInp) ftInp.value = '';
  clearTextSearch();
  kanbanLookup(nr);
  nrInp?.focus();
}

function clearTextSearch() {
  const container = document.getElementById('n-freitext-results');
  if (container) container.innerHTML = '';
}

async function submitKanban() {
  const nr   = document.getElementById('n-artnr').value.trim();
  const proj = document.getElementById('n-projekt').value;
  const komm = document.getElementById('n-kommentar').value.trim();
  if (!_currentStammEntry) { toast('Bitte zuerst eine gültige Artikelnummer eingeben', 'error'); return; }
  if (!proj) { toast('Bitte ein Projekt auswählen', 'error'); return; }
  const prio = document.getElementById('n-prio')?.checked || false;
  const body = {
    artikelnummer: nr, bezeichnung: _currentStammEntry.bezeichnung,
    spez1: _currentStammEntry.spez1||'', spez2: _currentStammEntry.spez2||'',
    projekt: proj, link: _currentStammEntry.link||'',
    lieferant: _currentStammEntry.lieferant||'', kommentar: komm,
    erstellt_von: 'Werkstatt', prio,
  };
  const schildMagnet = document.getElementById('n-schild-magnet')?.checked;
  const schildBox    = document.getElementById('n-schild-box')?.checked;
  try {
    await API.orders.create(body);
    toast('Karte eingelesen ✓');
    _printQueue.push({ nr, entry: _currentStammEntry });
    if (schildMagnet || schildBox) {
      const boxAnzahl = schildBox ? parseInt(document.getElementById('n-schild-box-anzahl')?.value || '2') : 0;
      try {
        await API.fehlendeSchilder.add({
          nr, bezeichnung: _currentStammEntry.bezeichnung,

        });

      } catch(_) {}
    }

  } catch(e) { handleError(e, 'Fehler beim Speichern'); }
}

// ── Neuen Artikel anlegen ─────────────────────────────────────────
async function submitNeuAnlegen() {
  const nr  = document.getElementById('an-artnr').value.trim();
  const bez = document.getElementById('an-bezeichnung').value.trim();

  if (!nr)  { toast('Artikelnummer ist Pflicht', 'error'); document.getElementById('an-artnr').focus(); return; }
  if (!bez) { toast('Bezeichnung ist Pflicht', 'error'); document.getElementById('an-bezeichnung').focus(); return; }

  // Prüfen ob Nummer schon existiert
  if (_stamm && _stamm[nr]) {
    toast(`Artikelnummer ${nr} existiert bereits!`, 'error'); return;
  }

  const druckKanban = document.getElementById('an-druck-magnet')?.checked;
  const druckRegal  = document.getElementById('an-druck-regal')?.checked;

  const newEntry = {
    bezeichnung:      bez,
    spez1:            document.getElementById('an-spez1').value.trim(),
    spez2:            document.getElementById('an-spez2').value.trim(),
    lieferant:        document.getElementById('an-lieferant').value.trim(),
    nachbestellmenge: parseFloat(document.getElementById('an-menge').value) || null,
    preis_netto:      parseFloat(document.getElementById('an-preis').value) || null,
    link:             document.getElementById('an-link').value.trim(),
  };

  // Stamm anlegen
  if (_stamm) _stamm[nr] = newEntry;
  try { await API.stamm.add(nr, newEntry); } catch(_) {}

  // Bestellung anlegen
  const body = {
    artikelnummer: nr, bezeichnung: bez,
    spez1: newEntry.spez1, spez2: newEntry.spez2,
    projekt: document.getElementById('an-projekt').value,
    link: newEntry.link, lieferant: newEntry.lieferant,
    kommentar: document.getElementById('an-kommentar').value.trim(),
    erstellt_von: 'Werkstatt',
  };

  try {
    await API.orders.create(body);
    toast(`Artikel ${nr} angelegt &amp; bestellt ✓`);

    // Zur Druckqueue hinzufügen
    _printQueue.push({ nr, entry: newEntry });
    updateDruckBtn();
    updateBadge();

    // Direkt drucken wenn gewählt
    if (druckKanban && druckRegal) {
      drucken('beide', [{ nr, entry: newEntry }]);
    } else if (druckKanban) {
      drucken('magnet', [{ nr, entry: newEntry }]);
    } else if (druckRegal) {
      drucken('box', [{ nr, entry: newEntry }]);
    }

    // Formular leeren, zurück zu Kanban
    ['an-artnr','an-bezeichnung','an-spez1','an-spez2','an-lieferant','an-link','an-kommentar'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
    ['an-menge','an-preis'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
    document.getElementById('an-artnr-hint').innerHTML = '';
    loadRecentEntries();

  } catch(e) { handleError(e, 'Fehler beim Speichern'); }
}

function drucken(typ, items, boxItemsOverride) {
  const queue = items || _printQueue;
  const boxQueue = boxItemsOverride || queue;
  if (!queue.length) return;

  // Exakte Maße aus den Word-Vorlagen:
  // Magnetschild: 81mm breit, 22mm hoch (feste Höhe), 2 pro Reihe
  //   — Artikelnummer-Spalte: 25mm, Bezeichnung-Spalte: 53mm
  // Boxenschild:  64mm breit, 40mm hoch (feste Höhe), 3 pro Reihe
  //   — Label-Spalte: 20mm, Inhalt-Spalte: 38mm

  function truncate(text, maxLen) {
    if (!text) return '';
    text = String(text).trim();
    return text.length > maxLen ? text.slice(0, maxLen - 1) + '\u2026' : text;
  }

  const magnetCards = queue.map(({ nr, entry }) => {
    const bez  = truncate(entry.bezeichnung, 55);
    const spez = truncate([entry.spez1, entry.spez2].filter(Boolean).join(' / '), 40);
    const lief = truncate(entry.lieferant, 30);
    return `<div class="mc">
      <table><tr>
        <td class="mc-nr">${nr}</td>
        <td class="mc-bez">
          <div class="mc-name">${bez}</div>
          ${spez ? `<div class="mc-spez">${spez}</div>` : ''}
          ${lief ? `<div class="mc-meta">${lief}</div>` : ''}
        </td>
      </tr></table>
    </div>`;
  }).join('');

  const boxCards = boxQueue.map(({ nr, entry }) => {
    const bez  = truncate(entry.bezeichnung, 80);
    const spez = truncate([entry.spez1, entry.spez2].filter(Boolean).join(' / '), 50);
    const lief = truncate(entry.lieferant, 35);
    return `<div class="bc">
      <table>
        <tr class="bc-hd"><td class="bc-lbl">Art.-Nr.</td><td class="bc-nr">${nr}</td></tr>
        <tr class="bc-bd"><td class="bc-lbl">Artikel</td><td class="bc-cnt">
          <span class="bc-name">${bez}</span>
          ${spez ? `<br><span class="bc-spez">${spez}</span>` : ''}
          ${lief ? `<br><span class="bc-meta">${lief}</span>` : ''}
        </td></tr>
      </table>
    </div>`;
  }).join('');

  const css = `
    @page { margin: 5mm; size: A4 portrait; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: #fff; color: #000; }
    h2 { font-size: 8pt; color: #999; margin: 0 0 2mm;
         text-transform: uppercase; letter-spacing: .05em; font-weight: 400; }

    /* ── Magnetschilder ── */
    /* Vorlage: 2 Karten/Reihe, je 81mm breit, 22mm hoch exakt */
    .mg { display: grid; grid-template-columns: 81mm 81mm; gap: 3mm; margin-bottom: 6mm; }
    .mc {
      width: 81mm; height: 22mm;
      border: 0.75pt solid #333;
      overflow: hidden;          /* Text der nicht passt wird abgeschnitten */
    }
    .mc table { width: 100%; height: 100%; border-collapse: collapse; }
    .mc-nr {
      width: 25mm; height: 22mm;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11pt; font-weight: bold;
      vertical-align: middle; text-align: center;
      border-right: 0.5pt solid #bbb;
      color: #14301b; line-height: 1;
      padding: 0 1.5mm;
      white-space: nowrap;
    }
    .mc-bez {
      width: 53mm; height: 22mm;
      vertical-align: middle;
      padding: 1mm 1.5mm;
      overflow: hidden;
    }
    .mc-name {
      font-size: 8.5pt; font-weight: bold; line-height: 1.2;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .mc-spez {
      font-size: 7pt; color: #333; line-height: 1.2;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    .mc-meta {
      font-size: 6.5pt; color: #888; line-height: 1.2;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }

    /* ── Boxenschilder ── */
    /* Vorlage: 3 Karten/Reihe, je 64mm breit, 40mm hoch exakt */
    .bg { display: grid; grid-template-columns: 64mm 64mm 64mm; gap: 3mm; }
    .bc {
      width: 64mm; height: 40mm;
      border: 0.75pt solid #333;
      overflow: hidden;
    }
    .bc table { width: 100%; height: 100%; border-collapse: collapse; }
    .bc-hd { height: 10mm; border-bottom: 0.5pt solid #ccc; background: #f5f5f5; }
    .bc-bd { height: 30mm; }
    .bc-lbl {
      width: 20mm; font-size: 6pt; color: #666;
      text-transform: uppercase; letter-spacing: .04em;
      vertical-align: middle; text-align: center;
      border-right: 0.5pt solid #e0e0e0;
      padding: 0 1mm;
    }
    .bc-nr {
      font-size: 12pt; font-weight: bold;
      font-family: 'Courier New', Courier, monospace;
      vertical-align: middle; padding: 0 2mm;
      color: #14301b; letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .bc-cnt {
      vertical-align: top; padding: 1.5mm 2mm;
      overflow: hidden; height: 30mm;
    }
    .bc-name {
      font-size: 8pt; font-weight: bold; line-height: 1.25;
      display: -webkit-box; overflow: hidden;
      -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    }
    .bc-spez {
      font-size: 6.5pt; color: #444; line-height: 1.2;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    .bc-meta {
      font-size: 6pt; color: #888; line-height: 1.2;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }

    @media print { body { margin: 0; } }
  `;

  let body = '';
  if (typ !== 'box')    body += '<h2>Magnetschilder</h2><div class="mg">' + magnetCards + '</div>';
  if (typ !== 'magnet') body += '<h2>Boxenschilder</h2><div class="bg">' + boxCards + '</div>';

  const w = window.open('', '_blank', 'width=900,height=720');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Vanfabrik Schilder</title><style>' + css + '</style></head><body>' + body + '<script>window.onload=function(){window.print();}<\/script></body></html>');
  w.document.close();
  if (!items) closeModal();
}

function vorschauImport() {
  const lines = document.getElementById('import-text').value.split('\n').map(l=>l.trim()).filter(Boolean);
  if (!lines.length) { toast('Nichts eingegeben', 'error'); return; }
  const rows = lines.map(nr => {
    const entry = _stamm && _stamm[nr];
    return { nr, entry, found: !!(entry && entry.bezeichnung) };
  });
  const found    = rows.filter(r => r.found).length;
  const notFound = rows.filter(r => !r.found).length;
  const preview  = document.getElementById('import-preview');
  preview.style.display = 'block';

  // Show summary + table with clear handling for unknowns
  preview.innerHTML =
    '<div style="display:flex;gap:.8rem;margin-bottom:.7rem;flex-wrap:wrap">' +
      (found > 0 ? '<span style="color:var(--pine);font-weight:700;font-size:.83rem">&#10003; ' + found + ' bekannt</span>' : '') +
      (notFound > 0 ?
        '<span style="color:var(--burgundy);font-weight:700;font-size:.83rem">&#9888; ' + notFound + ' nicht im Stamm</span>' +
        '<span style="font-size:.78rem;color:var(--ink3)">— werden einzeln als Hinweis f&uuml;r den Einkauf eingetragen</span>'
      : '') +
    '</div>' +
    '<div style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden">' +
      '<table style="width:100%;border-collapse:collapse">' +
        '<thead><tr style="background:var(--surface2)">' +
          '<th style="padding:.35rem .7rem;text-align:left;font-size:.68rem;color:var(--ink3);text-transform:uppercase">Nr.</th>' +
          '<th style="padding:.35rem .7rem;text-align:left;font-size:.68rem;color:var(--ink3);text-transform:uppercase">Artikel</th>' +
          '<th style="padding:.35rem .7rem;font-size:.68rem;color:var(--ink3);text-transform:uppercase;white-space:nowrap">Aktion</th>' +
        '</tr></thead>' +
        '<tbody>' + rows.map(function(r, i) {
          var bg = i % 2 === 0 ? 'var(--surface)' : '';
          var rowBg = r.found ? bg : 'rgba(139,26,14,.04)';
          return '<tr style="border-top:1px solid var(--border);background:' + rowBg + '">' +
            '<td style="padding:.35rem .7rem;font-family:monospace;font-weight:700;color:' + (r.found ? 'var(--pine)' : 'var(--burgundy)') + '">' + esc(r.nr) + '</td>' +
            '<td style="padding:.35rem .7rem;font-size:.82rem">' +
              (r.found ? esc(r.entry.bezeichnung.slice(0,38)) : '<em style="color:var(--ink3)">nicht im Stamm</em>') +
            '</td>' +
            '<td style="padding:.35rem .7rem;text-align:center;white-space:nowrap">' +
              (r.found
                ? '<span style="color:var(--pine);font-size:.72rem;font-weight:700">&#10003; bestellen</span>'
                : '<span style="color:var(--burgundy);font-size:.72rem;font-weight:700">als Hinweis</span>') +
            '</td>' +
          '</tr>';
        }).join('') +
        '</tbody>' +
      '</table>' +
    '</div>' +
    (notFound > 0 ?
      '<div style="margin-top:.6rem;padding:.6rem .8rem;background:rgba(139,26,14,.06);border-radius:var(--r-md);font-size:.75rem;color:var(--ink3);line-height:1.5">' +
        '<strong style="color:var(--burgundy)">Unbekannte Nummern:</strong> werden mit der Original-Nummer im Kommentar als Bestellung eingetragen. ' +
        'Der Einkauf sieht sie in der 9999-Queue und entscheidet ob ein Artikel angelegt wird.' +
      '</div>'
    : '');

  document.getElementById('btn-import-start').style.display = 'inline-flex';
}

async function startImport() {
  const lines = document.getElementById('import-text').value.split('\n').map(l=>l.trim()).filter(Boolean);
  const proj  = document.getElementById('import-projekt').value;
  let okKnown = 0, okUnknown = 0;
  const printItems = [];

  for (const nr of lines) {
    const entry = _stamm && _stamm[nr];
    if (entry && entry.bezeichnung) {
      // Bekannter Artikel — direkt bestellen
      try {
        await API.orders.create({
          artikelnummer: nr, bezeichnung: entry.bezeichnung,
          spez1: entry.spez1||'', spez2: entry.spez2||'',
          projekt: proj, link: entry.link||'', lieferant: entry.lieferant||'',
          erstellt_von: 'Werkstatt',
        });
        printItems.push({ nr, entry });
        okKnown++;
      } catch(_) {}
    } else {
      // Unbekannte Nummer — als 9999 mit Hinweis für Einkauf
      try {
        await API.orders.create({
          artikelnummer: '9999',
          bezeichnung: 'Unbekannt (' + nr + ')',
          projekt: proj,
          erstellt_von: 'Werkstatt',
          kommentar: 'Original-Nr: ' + nr + ' — Einkauf: bitte prüfen & anlegen',
        });
        okUnknown++;
      } catch(_) {}
    }
  }

  _printQueue.push(...printItems);
  closeModal();

  const msg = okKnown + ' bestellt' + (okUnknown > 0 ? ', ' + okUnknown + ' für Einkauf notiert' : '') + ' ✓';
  toast(msg);
  loadRecentEntries(); updateBadge(); updateDruckBtn();
}

async function loadRecentEntries() {
  const container = document.getElementById('recent-entries');
  if (!container) return;
  const today = new Date().toISOString().slice(0, 10);
  const orders = await API.orders.list();
  const recent = orders.filter(o => (o.erstellt_am===today||o.datum===today) && o.erstellt_von==='Werkstatt')
    .sort((a,b) => (b.erstellt_am_ts||b.datum||'').localeCompare(a.erstellt_am_ts||a.datum||'')).slice(0,20);
  if (!recent.length) {
    container.innerHTML = `<div style="color:var(--ink3);font-size:.85rem;padding:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);text-align:center">Heute noch keine Karten eingelesen.</div>`;
    return;
  }

// aber eigene Setter damit kein Refresh der Bestellliste ausgelöst wird
let _warenSortCol = 'bestellt_am';
let _warenSortDir = -1;

function setSortWarenCol(col) {
  if (_warenSortCol === col) _warenSortDir *= -1; else { _warenSortCol = col; _warenSortDir = -1; }
  renderWarenannahme();
}
function sortIconWaren(col) {
  if (_warenSortCol !== col) return '<span style="opacity:.25;font-size:.6rem">⬍</span>';
  return _warenSortDir === 1 ? '<span style="font-size:.65rem">▲</span>' : '<span style="font-size:.65rem">▼</span>';
}

function sortOrders_waren(orders) {
  return [...orders].sort((a,b) => {
    let av = a[_warenSortCol]||'', bv = b[_warenSortCol]||'';
    if (av<bv) return -_warenSortDir; if (av>bv) return _warenSortDir; return 0;
  });
}

    </div>
