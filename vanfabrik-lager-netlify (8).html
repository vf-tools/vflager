      <button class="btn btn-primary" onclick="saveStammLink('${esc(nr)}')">Speichern</button>
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
    </div>
  `);
  setTimeout(() => document.getElementById('edit-link-input')?.focus(), 80);
}

async function saveStammLink(nr) {
  const link = document.getElementById('edit-link-input').value.trim();
  try {
    await API.stamm.update(nr, { link });
    if (_stammAll) _stammAll[nr] = { ..._stammAll[nr], link };
    _stammArr = Object.entries(_stammAll).map(([n, a]) => ({ nr: n, ...a }));
    closeModal();
    toast('Bezugsweg gespeichert ✓');
    renderStamm();
  } catch(e) { handleError(e, 'Fehler beim Speichern'); }
}

// ── Excel Export ──────────────────────────────────────────────────
async function stammExportExcel() {
  toast('Excel wird erstellt…');

  // SheetJS laden falls nötig
  if (!window.XLSX) {
    await new Promise(function(resolve) {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload = resolve;
      document.head.appendChild(s);
    });
  }

  // Stamm-Daten
  const stamm = _stammArr;

  // Header wie Originaldatei
  const headers = [
    'Markierung zum Nachdrucken','Artikelnummer','Artikelart','Artikelgruppe','Kategorie',
    'Bezeichnung','Artikelgruppe2','Spezifikation_1','Spezifikation_2','Zusammenfassung',
    'Lieferant','Link','S-Verweisfähige Artikelnummer','Nachbestellmenge',
    'Menge Einkaufseinheit','Menge Verkaufseinheit','Hilfsspalte brutto','Hilfsspalte netto',
    'Preis EE netto','Preis VE netto ohne Zuschlag','VK mit zuschlag brutto','Link kontrolliert'
  ];

  const rows = stamm.map(function(a) {
    const spez1 = a.spez1 || '';
    const spez2 = a.spez2 || '';
    // Preis EE netto berechnen falls nicht gespeichert
    var preisEE = a.preis_netto != null ? a.preis_netto : null;
    if (!preisEE && a.hilfsspalte_brutto) preisEE = a.hilfsspalte_brutto / 1.19;
    else if (!preisEE && a.hilfsspalte_netto) preisEE = a.hilfsspalte_netto;
    // Preis VE netto berechnen
    var preisVE = a.preis_ve_netto != null ? a.preis_ve_netto : null;
    if (!preisVE && preisEE && a.menge_einkaufseinheit && a.menge_verkaufseinheit) {
      preisVE = preisEE / a.menge_einkaufseinheit * a.menge_verkaufseinheit;
    }
    // VK brutto
    var vkBrutto = preisVE ? preisVE * 1.2 * 1.3 : '';
    return [
      '',                                          // Markierung
      a.nr,                                        // Artikelnummer
      'Lagerartikel',                              // Artikelart
      '', '',                                      // Artikelgruppe, Kategorie
      a.bezeichnung || '',                         // Bezeichnung
      '',                                          // Artikelgruppe2
      spez1,                                       // Spezifikation_1
      spez2,                                       // Spezifikation_2
      [spez1,spez2].filter(Boolean).join(' / '),   // Zusammenfassung
      a.lieferant || '',                           // Lieferant
      a.link || '',                                // Link
      '',                                          // S-Verweisfähige Nr
      a.nachbestellmenge != null ? a.nachbestellmenge : '', // Nachbestellmenge
      a.menge_einkaufseinheit != null ? a.menge_einkaufseinheit : '', // Menge EE
      a.menge_verkaufseinheit != null ? a.menge_verkaufseinheit : '', // Menge VE
      a.hilfsspalte_brutto != null ? a.hilfsspalte_brutto : '', // Hilfsspalte brutto
      a.hilfsspalte_netto != null  ? a.hilfsspalte_netto  : '', // Hilfsspalte netto
      preisEE != null ? preisEE : '',              // Preis EE netto
      preisVE != null ? preisVE : '',              // Preis VE netto
      vkBrutto || '',                              // VK brutto
      '',                                          // Link kontrolliert
    ];
  });

  const wb = XLSX.utils.book_new();
  const wsData = [headers, ...rows];
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Spaltenbreiten
  ws['!cols'] = [
    {wch:8},{wch:14},{wch:14},{wch:12},{wch:10},{wch:35},{wch:12},
    {wch:18},{wch:18},{wch:25},{wch:15},{wch:30},{wch:18},{wch:14},
    {wch:14},{wch:14},{wch:12},{wch:12},{wch:14},{wch:18},{wch:18},{wch:14}
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'Artikelstamm');
  const datum = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, 'Vanfabrik_Artikelstamm_' + datum + '.xlsx');
  toast('Excel heruntergeladen ✓');
}

let _druckCurrentEntry = null;
let _druckCurrentNr = null;

function druckLookup(val) {
  const nr = val.trim();
  const preview   = document.getElementById('d-preview');
  const unbekannt = document.getElementById('d-unbekannt');
  const schild    = document.getElementById('d-schild-wahl');
  if (schild) schild.style.display = 'none';

  if (!nr || nr.length < 2) {
    preview.style.display = 'none'; unbekannt.style.display = 'none';
    _druckCurrentEntry = null; _druckCurrentNr = null; return;
  }

  const entry = _druckStamm && _druckStamm[nr];
  if (entry && entry.bezeichnung) {
    _druckCurrentEntry = entry; _druckCurrentNr = nr;
    document.getElementById('d-bez').textContent   = entry.bezeichnung;
    document.getElementById('d-lief').textContent  = entry.lieferant || '–';
    document.getElementById('d-spez').textContent  = [entry.spez1, entry.spez2].filter(Boolean).join(' · ') || '–';
    document.getElementById('d-menge').textContent = entry.nachbestellmenge ? entry.nachbestellmenge + ' Stk.' : '–';
    preview.style.display = 'block'; unbekannt.style.display = 'none';
  } else if (nr.length >= 3) {
    _druckCurrentEntry = null; _druckCurrentNr = nr;
    preview.style.display = 'none'; unbekannt.style.display = 'block';
  }
}

async function druckBestellen() {
  if (!_druckCurrentEntry || !_druckCurrentNr) return;
  const proj = document.getElementById('d-projekt').value;
  const body = {
    artikelnummer: _druckCurrentNr,
    bezeichnung:   _druckCurrentEntry.bezeichnung,
    spez1: _druckCurrentEntry.spez1 || '',
    spez2: _druckCurrentEntry.spez2 || '',
    projekt: proj,
    link: _druckCurrentEntry.link || '',
    lieferant: _druckCurrentEntry.lieferant || '',
    erstellt_von: APP.role === 'werkstatt' ? 'Werkstatt' : 'Einkauf',
  };
  try {
    await API.orders.create(body);
    toast('Bestellt ✓ — ' + _druckCurrentEntry.bezeichnung);
    // Schilder automatisch anbieten
    document.getElementById('d-schild-wahl').style.display = 'block';
    updateBadge();
  } catch(e) { handleError(e, 'Fehler'); }
}

function druckNachSchild() {
  const sw = document.getElementById('d-schild-wahl');
  if (sw) sw.style.display = sw.style.display === 'none' ? 'block' : 'none';
}

function druckenDirekt(typ) {
  if (!_druckCurrentEntry || !_druckCurrentNr) return;
  drucken(typ, [{ nr: _druckCurrentNr, entry: _druckCurrentEntry }]);
  toast('Druckdialog geöffnet ✓');
}

function druckenMulti(typ) {
  const text  = document.getElementById('d-multi').value;
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) { toast('Keine Nummern eingegeben', 'error'); return; }

  const items = lines
    .map(nr => ({ nr, entry: _druckStamm && _druckStamm[nr] }))
    .filter(i => i.entry && i.entry.bezeichnung);

  const notFound = lines.length - items.length;
  if (!items.length) { toast('Keine bekannten Artikel gefunden', 'error'); return; }
  if (notFound > 0) toast(`${notFound} Artikel nicht im Stamm — werden übersprungen`, 'info');

  drucken(typ, items);
}

async function loadDruckRecent() {
  const container = document.getElementById('d-recent');
  if (!container) return;
  const orders = await API.orders.list();
  const recent = orders.slice(-8).reverse();
  if (!recent.length) {

      </div>
      <span style="font-size:.68rem;color:var(--ink4)">↙</span>
    </div>`).join('');
}

async function neuArtikelCheckNr(val) {
  const hint = document.getElementById('na-nr-hint');
  if (!hint) return;
  const nr = (val || '').trim();
  if (!nr || nr.length < 2) { hint.innerHTML = ''; return; }
  let stamm = {};
  try { stamm = await API.stamm.list(); } catch(_) {}
  if (stamm[nr]) {
    hint.innerHTML = `<span style="color:var(--burgundy)">⚠ Vergeben: ${esc(stamm[nr].bezeichnung.slice(0,30))}</span>`;
  } else {
    hint.innerHTML = '<span style="color:var(--pine)">✓ Frei — kann verwendet werden</span>';
  }
}

async function neuArtikelSpeichern() {
  const nr  = (document.getElementById('na-nr')?.value || '').trim();
  const bez = (document.getElementById('na-bez')?.value || '').trim();

  const proj = document.getElementById('na-projekt')?.value || '';
  if (!nr)   { toast('Artikelnummer ist Pflicht', 'error'); document.getElementById('na-nr')?.focus(); return; }
  if (!bez)  { toast('Bezeichnung ist Pflicht', 'error');   document.getElementById('na-bez')?.focus(); return; }
  if (!proj) { toast('Projekt ist Pflicht', 'error');       document.getElementById('na-projekt')?.focus(); return; }

  let stamm = {};
  try { stamm = await API.stamm.list(); } catch(_) {}
  if (stamm[nr]) { toast(`Artikelnummer ${nr} ist bereits vergeben!`, 'error'); return; }

  // Schilder: immer 1 Magnet + 2 Box automatisch

  const preisEE_val = parseFloat(document.getElementById('na-preis-ee')?.value) || null;
  const preisVE_val = parseFloat(document.getElementById('na-preis-ve')?.value) || null;
  const mengeEE_val = parseFloat(document.getElementById('na-menge-ee')?.value) || 1;
  const mengeVE_val = parseFloat(document.getElementById('na-menge-ve')?.value) || 1;
  const entry = {
    bezeichnung:           bez,
    spez1:                 (document.getElementById('na-spez1')?.value || '').trim(),
    spez2:                 (document.getElementById('na-spez2')?.value || '').trim(),
    lieferant:             (document.getElementById('na-lief')?.value || '').trim(),
    nachbestellmenge:      parseFloat(document.getElementById('na-menge')?.value) || null,
    preis_netto:           preisEE_val,
    menge_einkaufseinheit: mengeEE_val,
    menge_verkaufseinheit: mengeVE_val,
    preis_ve_netto:        preisVE_val,
    link:                  (document.getElementById('na-link')?.value || '').trim(),
    lagerartikel:          document.getElementById('na-lagerartikel')?.checked || false,
    angelegt_von:          'Einkauf',
  };

  try {
    // 1. Stamm anlegen
    await API.stamm.add(nr, entry);

    // 2. Bestellung anlegen
    await API.orders.create({
      artikelnummer: nr,
      bezeichnung:   bez,
      spez1:         entry.spez1,
      spez2:         entry.spez2,
      projekt:       proj,
      link:          entry.link,
      lieferant:     entry.lieferant,
      kommentar:     (document.getElementById('na-komm')?.value || '').trim(),
      erstellt_von:  'Einkauf',
    });

    toast(`Artikel ${nr} angelegt ✓`);
    updateBadge();

    // 3. Schilder zur Warteschlange (Supabase): 1 Magnet + 2 Box
    try {
      await API.fehlendeSchilder.add({
        nr, bezeichnung: bez,
        spez1: entry.spez1 || '', spez2: entry.spez2 || '',
        magnet: true, box: true, box_anzahl: 2
      });
      updateSchilderBadge();
    } catch(_) {}

    // 4. Zurück zur Bestellliste
    switchView('bestellungen');

  } catch(e) { handleError(e, 'Fehler beim Anlegen'); }
}

function naPreisBerechnen() {
  var brutto   = parseFloat(document.getElementById('na-brutto')?.value) || null;
  var nettoDi  = parseFloat(document.getElementById('na-netto-direkt')?.value) || null;
  var mengeEE  = parseFloat(document.getElementById('na-menge-ee')?.value) || 1;
  var mengeVE  = parseFloat(document.getElementById('na-menge-ve')?.value) || 1;

  var preisEE = brutto != null ? brutto / 1.19 : nettoDi;
  var preisVE = preisEE != null ? preisEE / mengeEE * mengeVE : null;

  var eeHid = document.getElementById('na-preis-ee');
  var eeHid2 = document.getElementById('na-preis');
  var eeDis = document.getElementById('na-preis-ee-display');
  var veHid = document.getElementById('na-preis-ve');
  var veDis = document.getElementById('na-preis-ve-display');
  var vkEl  = document.getElementById('na-vk-brutto');

  if (eeHid)  eeHid.value  = preisEE != null ? preisEE.toFixed(6) : '';
  if (eeHid2) eeHid2.value = preisEE != null ? preisEE.toFixed(6) : '';
  if (eeDis)  eeDis.textContent = preisEE != null ? preisEE.toFixed(4) + ' €' : '–';
  if (veHid)  veHid.value  = preisVE != null ? preisVE.toFixed(6) : '';
  if (veDis)  veDis.textContent = preisVE != null ? preisVE.toFixed(4) + ' €' : '–';
  if (vkEl)   vkEl.textContent  = preisVE != null ? (preisVE * 1.56).toFixed(2) + ' €' : '–';
}

async function naVorschlagNummer() {
  try {
    var nrInput = document.getElementById('na-nr');
    if (!nrInput || nrInput.value) return; // nicht überschreiben wenn schon was drin
    var stamm = await API.stamm.list();
    var nummern = new Set(Object.keys(stamm).map(function(n){ return parseInt(n); }).filter(function(n){ return n >= 2000 && n < 3000; }));
    var vorschlag = 2000;
    while (nummern.has(vorschlag)) vorschlag++;
    nrInput.value = vorschlag;
    // Hint anzeigen
    var hint = document.getElementById('na-nr-hint');
    if (hint) hint.textContent = 'Vorschlag: nächste freie 2000er-Nummer';
  } catch(_) {}
}

    var navWaren     = document.getElementById('nav-waren');
    var navDruck     = document.getElementById('nav-drucken');
    var navStamm     = document.getElementById('nav-stamm');
    var navAusw      = document.getElementById('nav-auswertung');
    var navNeuArtikel = document.getElementById('nav-neu-artikel');

    // Einkauf:      Dashboard, Bestellungen, Stamm, Artikel anlegen, Schilder, Auswertung
    // Werkstatt:    Bestellungen (lesen), Kanban, Schilder
    // Warenannahme: Bestellungen (lesen), Warenannahme
    if (navDash)      navDash.style.display      = 'none'; // Dashboard entfernt
    if (navNeu)       navNeu.style.display        = role==='werkstatt'    ? 'flex' : 'none';
    if (navWaren)     navWaren.style.display      = role==='warenannahme' ? 'flex' : 'none';
    if (navDruck)     navDruck.style.display      = 'none'; // Schilder nur über Badge-Button
    if (navStamm)     navStamm.style.display      = role==='einkauf'      ? 'flex' : 'none';
    if (navAusw)      navAusw.style.display       = role==='einkauf'      ? 'flex' : 'none';
    if (navNeuArtikel) navNeuArtikel.style.display = role==='einkauf'     ? 'flex' : 'none';
    document.getElementById('screen-role').style.display = 'none';
    document.getElementById('screen-app').style.display  = 'flex';
    await Promise.all([API.checkVersion(), loadProjekte()]);
    if (role === 'werkstatt') switchView('neu');
    else if (role === 'warenannahme') switchView('warenannahme');
    else switchView('bestellungen'); // einkauf
    updateBadge();
  });
});

function switchView(name) {
  document.querySelectorAll('.nav-item[data-view]').forEach(function(l){ l.classList.toggle('active', l.dataset.view===name); });
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  var el = document.getElementById('view-'+name);
  if (el) el.classList.add('active');
  var renderer = window.VIEW_RENDERERS[name];
  if (renderer) renderer();
  document.getElementById('main-content').scrollTop = 0;
}

// ── Lieferant Autocomplete ────────────────────────────────────────
// Sammelt alle bekannten Lieferanten aus dem Stamm und zeigt Vorschläge
var _lieferantenCache = null;

async function getLieferanten() {
  if (_lieferantenCache) return _lieferantenCache;
  try {
    var stamm = await API.stamm.list();
    var set = {};
    Object.values(stamm).forEach(function(s) {
      var l = (s.lieferant || '').trim();
      if (l && l !== '0') set[l.toLowerCase()] = l;
    });
    _lieferantenCache = Object.values(set).sort(function(a,b){ return a.localeCompare(b,'de'); });
  } catch(_) { _lieferantenCache = []; }
  return _lieferantenCache;
}

function initLieferantAutocomplete(inputId) {
  var input = document.getElementById(inputId);
  if (!input) return;
  // Dropdown an body hängen damit overflow:hidden kein Problem ist
  var list = document.createElement('div');
  list.className = '__lief-ac';
  list.style.cssText = 'position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:0 4px 16px rgba(0,0,0,.15);max-height:200px;overflow-y:auto;min-width:220px';
  list.style.display = 'none';
  document.body.appendChild(list);

  function positionList() {
    var rect = input.getBoundingClientRect();
    list.style.top  = (rect.bottom + 4) + 'px';
    list.style.left = rect.left + 'px';
    list.style.width = rect.width + 'px';
  }

  input.addEventListener('input', async function() {
    var q = this.value.trim().toLowerCase();
    list.innerHTML = '';
    if (!q || q.length < 1) { list.style.display = 'none'; return; }
    var lieferanten = await getLieferanten();
    var matches = lieferanten.filter(function(l) { return l.toLowerCase().includes(q); }).slice(0, 8);
    if (!matches.length) { list.style.display = 'none'; return; }
    matches.forEach(function(l) {
      var item = document.createElement('div');
      item.textContent = l;
      item.style.cssText = 'padding:.45rem .8rem;cursor:pointer;font-size:.85rem;border-bottom:1px solid var(--border)';
      item.addEventListener('mousedown', function(e) {
        e.preventDefault();
        input.value = l;
        list.style.display = 'none';
        input.dispatchEvent(new Event('change'));
      });
      item.addEventListener('mouseover', function() { this.style.background = '#e8f0e8'; });
      item.addEventListener('mouseout',  function() { this.style.background = ''; });
      list.appendChild(item);
    });
    positionList();
    list.style.display = 'block';
  });

  input.addEventListener('blur', function() {
    setTimeout(function() { list.style.display = 'none'; }, 150);
  });
  input.addEventListener('focus', function() {
    if (this.value.trim()) this.dispatchEvent(new Event('input'));
  });
}


// ── Fehlende Schilder (global, Supabase) ─────────────────────────
async function updateSchilderBadge() {
  try {
    var items = await API.fehlendeSchilder.list();
    var btns = document.querySelectorAll('.btn-schilder-badge');
    btns.forEach(function(btn) {
      if (items.length > 0) {
        btn.style.display = 'flex';
        btn.textContent = '\uD83D\uDDA8 ' + items.length + ' Schild' + (items.length > 1 ? 'er' : '') + ' fehlt';
      } else {
        btn.style.display = 'none';
      }
    });
  } catch(_) {}
}

async function zeigeSchilderListe() {
  var items;
  try { items = await API.fehlendeSchilder.list(); } catch(e) { toast('Fehler beim Laden', 'error'); return; }

  if (!items.length) {
    openModal(
      '<div class="modal-title">&#128424; Fehlende Schilder</div>' +
      '<p style="color:var(--ink3);font-size:.85rem">Keine fehlenden Schilder eingetragen.</p>' +
      '<div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">Schlie\xdfen</button></div>'
    );
    return;
  }

  var rows = items.map(function(s) {
    var typ = s.magnet && s.box ? 'Magnet + Box' : s.magnet ? '\u25A1 Magnet' : '\uD83D\uDCE6 Box';
    return '<tr>' +
      '<td style="padding:.45rem .7rem"><code style="color:var(--pine);font-weight:700;font-size:.82rem">' + esc(s.nr) + '</code></td>' +
      '<td style="padding:.45rem .7rem;font-weight:600;font-size:.84rem">' + esc((s.bezeichnung||'').slice(0,35)) + '</td>' +
      '<td style="padding:.45rem .7rem;font-size:.75rem;color:var(--ink3)">' + esc([s.spez1,s.spez2].filter(Boolean).join(' \xb7 ')) + '</td>' +
      '<td style="padding:.45rem .7rem;font-size:.78rem;white-space:nowrap">' + typ + '</td>' +
      '<td style="padding:.45rem .7rem">' +
        '<button class="btn btn-secondary btn-sm" style="width:26px;height:26px;padding:0;justify-content:center" ' +
        'data-del-id="' + s.id + '">&#10005;</button>' +
      '</td>' +
    '</tr>';
  }).join('');

  var magnetItems = items.filter(function(s){return s.magnet;});
  var boxItems    = items.filter(function(s){return s.box;});

  openModal(
    '<div class="modal-title">&#128424; Fehlende Schilder (' + items.length + ')</div>' +
    '<div class="table-wrap" style="margin-bottom:1rem"><table>' +
      '<thead><tr><th>Nr.</th><th>Bezeichnung</th><th>Spez.</th><th>Typ</th><th></th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table></div>' +
    '<div class="form-actions">' +
      (magnetItems.length ? '<button class="btn btn-secondary btn-sm" id="btn-druck-magnet-g">\u25A1 ' + magnetItems.length + ' Magnetschilder</button>' : '') +
      (boxItems.length    ? '<button class="btn btn-secondary btn-sm" id="btn-druck-box-g">\uD83D\uDCE6 ' + boxItems.length + ' Boxenschilder</button>' : '') +
      '<button class="btn btn-primary" id="btn-druck-alle-g">&#128424; Alle drucken</button>' +
      '<button class="btn btn-secondary" id="btn-alle-erl">&#10003; Alle als erledigt</button>' +
      '<button class="btn btn-secondary" onclick="closeModal()">&#10005;</button>' +
    '</div>'
  );

  setTimeout(function() {
    // Schilder direkt drucken mit korrekter Trennung
    var doDruck = function(list, typ) {
      var magnetList = [];
      var boxList    = [];
      list.forEach(function(s) {
        var item = {nr:s.nr,entry:{bezeichnung:s.bezeichnung,spez1:s.spez1,spez2:s.spez2}};
        if ((typ === 'magnet' || typ === 'beide') && s.magnet) {
          magnetList.push(item);
        }
        if ((typ === 'box' || typ === 'beide') && s.box) {
          var anzBox = s.box_anzahl || 2;
          for (var i = 0; i < anzBox; i++) boxList.push(item);
        }
      });
      // drucken() mit vorbereiteten Listen aufrufen
      if (magnetList.length && boxList.length) {
        drucken('beide', magnetList, boxList);
      } else if (magnetList.length) {
        drucken('magnet', magnetList);
      } else if (boxList.length) {
        drucken('box', boxList);
      }
    };

    document.querySelectorAll('[data-del-id]').forEach(function(btn) {
      btn.addEventListener('click', async function() {
        await API.fehlendeSchilder.loeschen(this.dataset.delId);
        updateSchilderBadge();
        zeigeSchilderListe();
      });
    });

    var m = document.getElementById('btn-druck-magnet-g');
    var b = document.getElementById('btn-druck-box-g');
    var a = document.getElementById('btn-druck-alle-g');
    var e = document.getElementById('btn-alle-erl');

    if (m) m.addEventListener('click', function(){ closeModal(); doDruck(magnetItems,'magnet'); });
    if (b) b.addEventListener('click', function(){ closeModal(); doDruck(boxItems,'box'); });
    if (a) a.addEventListener('click', function(){ closeModal(); doDruck(items,'beide'); });
    if (e) e.addEventListener('click', async function() {
      await API.fehlendeSchilder.alleErledigt();
      updateSchilderBadge();
      closeModal();
      toast('Alle Schilder als erledigt markiert ✓');
    });
  }, 0);
}
